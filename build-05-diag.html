  }
  var bannerEl = el('div','position:fixed;left:50%;top:22%;transform:translate(-50%,0);z-index:17;pointer-events:none;'
    + 'text-align:center;font-family:'+T.serif+';display:none;');
  root.appendChild(bannerEl);
  function banner(text, kind){
    bannerEl.innerHTML='';
    var sub = kind==='levelup'?'LEVEL UP':kind==='complete'?'QUEST COMPLETE':kind==='accept'?'QUEST':kind==='death'?'':'';
    if (sub) bannerEl.appendChild(el('div','color:'+(kind==='death'?T.bad:T.gold)+';font-size:13px;letter-spacing:4px;margin-bottom:4px;',sub));
    bannerEl.appendChild(el('div','color:'+T.ink+';font-size:26px;letter-spacing:1px;text-shadow:0 2px 10px rgba(0,0,0,.7);',text));
    bannerEl.style.display='block'; bannerEl.style.animation='none'; void bannerEl.offsetWidth;
    bannerEl.style.animation='efBanner 2.2s ease-out forwards';
    setTimeout(function(){ bannerEl.style.display='none'; }, 2200);
  }
  var toastEl = el('div','position:fixed;left:50%;top:calc(70px + '+SA+'top));transform:translateX(-50%);z-index:17;'
    + 'pointer-events:none;display:none;font-family:'+T.serif+';color:'+T.ink+';font-size:14px;'
    + 'background:rgba(21,16,11,.9);border:1px solid '+T.brassDk+';border-radius:8px;padding:8px 14px;box-shadow:0 4px 14px rgba(0,0,0,.5);');
  root.appendChild(toastEl); var toastT=null;
  function toast(text){ toastEl.textContent=text; toastEl.style.display='block';
    clearTimeout(toastT); toastT=setTimeout(function(){ toastEl.style.display='none'; }, 2200); }

  /* =======================================================================
   * 7. TITLE / DEATH / RESPAWN  (overlays own the mode while shown)
   * ===================================================================== */
  /* [build-05 integrator patch] overlays must OUTRANK the map panel (z18,
   * body-level). As children of root (z10) their z20 was trapped in root's
   * stacking context and the death screen rendered UNDER an open map,
   * making "Rise Again" unreachable. Body-level + z30 fixes the ordering. */
  function overlay(bg){ var o = el('div','position:fixed;inset:0;z-index:30;display:none;flex-direction:column;'
    + 'align-items:center;justify-content:center;text-align:center;pointer-events:auto;font-family:'+T.serif+';background:'+bg+';'); document.body.appendChild(o); return o; }
  function bigBtn(label){ var b = el('div','min-height:60px;padding:16px 40px;display:flex;align-items:center;justify-content:center;'
    + 'font-size:18px;letter-spacing:1px;color:#1a1408;border-radius:8px;font-family:'+T.serif+';'
    + 'background:linear-gradient(#f0dfa8,#c9a84f);border:1px solid '+T.brassDk+';box-shadow:0 4px 12px rgba(0,0,0,.5);', label);
    b.className='ef-chip'; return b; }

  var titleScreen = overlay('radial-gradient(ellipse at 50% 34%, #2c3a55 0%, #0c101c 72%)');
  titleScreen.append(
    el('div','color:'+T.ink+';font-size:46px;letter-spacing:7px;text-shadow:0 0 26px rgba(120,160,255,.5);','EMBERFELL'),
    el('div','color:#9aa8c4;font-size:14px;margin:16px 26px 30px;max-width:300px;line-height:1.6;',
      'A pocket-sized open world. Wolves haunt the pines beyond the village — old Maren at the fire could use a hand.')
  );
  var startBtn = bigBtn('Enter World'); titleScreen.appendChild(startBtn);
  tap(startBtn, function(){
    // first user gesture: nudge the audio ctx awake (engine unlocks on gesture too)
    try { if (eng && eng.audio && eng.audio.setMuted) eng.audio.setMuted(false); } catch(_){}
    titleScreen.style.display='none'; setMode('play'); bus.emit('ui:start',{}); refreshHUD();
  });

  var deathScreen = overlay('rgba(38,4,4,.86)');
  deathScreen.append(el('div','color:'+T.bad+';font-size:40px;letter-spacing:5px;margin-bottom:24px;text-shadow:0 2px 12px #000;','YOU DIED'));
  var respBtn = bigBtn('Rise Again'); deathScreen.appendChild(respBtn);
  tap(respBtn, function(){ deathScreen.style.display='none'; bus.emit('player:respawn',{}); setMode('play'); });

  /* =======================================================================
   * 8. EVENT WIRING  (feedback only — never mutating state)
   * ===================================================================== */
  bus.on('player:damaged', function(p){ if (!p||p.__selfTest) return; var a=p.amount||1;
    doFlash(Math.min(.5,.18+a*.02)); popup('-'+a, T.hp); markDirty(); });
  bus.on('combat:damage', function(p){ if (!p||p.__selfTest) return;   // §4 candidate: enemy hit numbers
    popup((p.crit?'✸':'')+'-'+(p.amount||0), p.crit?T.gold:'#ffffff'); });
  bus.on('loot:collected', function(p){ if (!p||p.__selfTest) return;
    var it=p.item||'item', n=p.count||1;
    if (it==='gold'){ popup('+'+n+' gold', T.gold); sfx('ui.coin'); }
    else popup('+'+(n>1?n+' ':'')+it, T.good);
    markDirty(); if (invP.wrap.style.display==='flex') renderInv(); });
  bus.on('player:levelup', function(p){ if (!p||p.__selfTest) return;
    banner('Level '+(p.level||P().lvl), 'levelup'); sfx('ui.levelup'); markDirty(); });
  bus.on('quest:started', function(p){ if (!p||p.__selfTest) return;
    banner((p.name||'New quest'), 'accept'); sfx('ui.quest'); markDirty(); if (qP.wrap.style.display==='flex') renderQuests(); });
  bus.on('quest:updated', function(p){ if (!p||p.__selfTest) return; markDirty(); if (qP.wrap.style.display==='flex') renderQuests(); });
  bus.on('quest:completed', function(p){ if (!p||p.__selfTest) return;
    banner((p.name||'Quest complete'), 'complete'); sfx('ui.quest'); markDirty(); if (qP.wrap.style.display==='flex') renderQuests(); });
  bus.on('player:died', function(p){ if (!p||p.__selfTest) return;
    deathScreen.style.display='flex'; setMode('menu'); sfx('ui.death'); });
  bus.on('player:spawned', function(p){ if (!p||p.__selfTest) return;
    deathScreen.style.display='none'; if (titleScreen.style.display!=='flex') setMode('play'); markDirty(); refreshHUD(); });
  bus.on('ui:toast', function(p){ if (!p||p.__selfTest) return; toast(p.text||''); });
  bus.on('dialogue:open', function(p){ if (!p||p.__selfTest) return; openDialogue(p); });
  bus.on('dialogue:close', function(p){ if (p&&p.__selfTest) return; closeDialogue(); });
  // quest-log open via a dedicated tap on the quest HUD line
  tap(questLine, toggleQuests);

  /* =======================================================================
   * 9. HUD REFRESH  — throttled DOM writes (§7 discipline) + interact label
   * ===================================================================== */
  var dirty = true, acc = 0, HUD_HZ = 8;
  function markDirty(){ dirty = true; }
  var lvEl, goldEl, wpnEl;
  function grab(){ lvEl=document.getElementById('ef-lv'); goldEl=document.getElementById('ef-gold'); wpnEl=document.getElementById('ef-wpn'); }
  grab();
  function pct(v,m){ return Math.max(0,Math.min(100,(v/(m||1))*100)); }
  function refreshHUD(){
    var pl = P(), s = S();
    hpB.fill.style.width = pct(pl.hp,pl.maxhp)+'%';
    stB.fill.style.width = pct(pl.st,pl.maxst||100)+'%';
    xpB.fill.style.width = pct(pl.xp,pl.xpNext)+'%';
    if (lvEl) lvEl.textContent = pl.lvl; if (goldEl) goldEl.textContent = pl.gold||0;
    var eqName = (s.inventory||[]).filter(function(i){return i.id===s.equipped;})[0];
    if (wpnEl) wpnEl.textContent = (eqName&&eqName.name) || pl.weapon || '—';
    // tracked quest line
    var tq = (s.quests||[]).filter(function(q){return q.id===s.tracked;})[0];
    if (tq && tq.state==='active'){ questLine.style.display='block'; questLine.textContent='Quest: '+(tq.line||tq.name); }
    else if (!s.tracked) questLine.style.display='none';
    dirty = false;
  }
  function refreshInteract(){
    var it = (S().interact)||FALLBACK.interact;
    if (EF.ui.mode!=='play'){ bInteract.style.display='none'; return; }
    if (it.available){ bInteract.style.display='flex'; bInteract.textContent = it.label||'Interact'; }
    else bInteract.style.display='none';
  }
  bus.on('game:tick', function(t){
    acc += (t && t.dt) || 0.016;
    if (dirty || acc >= 1/HUD_HZ){ acc = 0; refreshHUD(); }
    refreshInteract();
  });

  /* =======================================================================
   * 10. PUBLIC API + self-test
   * ===================================================================== */
  EF.ui = {
    mode: 'play', setMode: setMode,
    toast: toast, banner: banner, popup: popup,
    openBag: toggleBag, openQuests: toggleQuests, openMenu: toggleMenu, closeAll: closeAll,
    showTitle: function(){ titleScreen.style.display='flex'; setMode('menu'); },
    refresh: function(){ markDirty(); refreshHUD(); },
    selfTest: function(){
      var checks = [];
      function ck(n,v){ checks.push({ check:n, ok:!!v }); }
      ck('root mounted', document.body.contains(root));
      ck('hud bars', !!(hpB.fill && stB.fill && xpB.fill));
      ck('buttons registered', !!(bAttack&&bJump&&bInteract&&bBag&&bMap&&bMenu));
      ck('panels built', !!(invP.wrap&&qP.wrap&&mP.wrap));
      ck('death screen', !!deathScreen);
      ck('style injected', !!document.querySelector('style[data-ef="ui"]'));
      var pass = checks.every(function(c){return c.ok;});
      console.log('[EF.ui] self-test '+(pass?'PASS':'FAIL'), checks);
      return { pass:pass, checks:checks };
    }
  };

  // Show the title screen on load unless a host has already started play.
  if (!EF.__started) EF.ui.showTitle();
  refreshHUD();
  console.log('[EF.ui] ready — HUD, controls, panels, feedback, dialogue, death/respawn');
})();

<!-- ================= map.js                 Cycle 3  (UI/UX) + integrator POI-field patch ================= -->
<script>
/* ============================================================================
 * EMBERFELL — map.js   (UI/UX department — Cycle 3)
 * The chart: a top-down parchment relief drawn from data. Terrain is sampled
 * ONCE at init from the ground sampler into an offscreen canvas (a hand-inked
 * cartographer's chart, not a radar screen); POIs, the player arrow, and the
 * quest pin are overlaid live. Opening the map paints instantly because the
 * relief is prebuilt — "where you are and where the quest is" inside 1s.
 * A north-up corner minimap redraws at ≤5 Hz.
 *
 * Runtime data (queried, never hardcoded):
 *   world extent  EF.worldData.terrain.size   (fallback 200)
 *   ground height EF.engine.groundAt(x,z) | EF.worldData.terrain.sample
 *   POIs          EF.world.pois[] { id,name,type,x,z }
 *   player pose   EF.state.player { x,z,yaw }   (read-only)
 *   quest pin     event map:setMarker { x,z,label } | null to clear
 *
 * Public: EF.ui.map.open() / .close() / .toggle() / .rebuild() / .setMarker()
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.bus) { console.error('[EF.map] EF.bus missing — load engine.js first'); return; }
  var bus = EF.bus, eng = EF.engine || null;

  var T = { ink:'#f3e9c8', gold:'#ffd97a', brass:'#c9a84f', brassDk:'#8a6d2a',
            parch:'#d9c9a0', paper:'#e9dcb8', umber:'#7d5f36', shadow:'#5f4a2c',
            serif:"Georgia,'Iowan Old Style',serif" };

  /* ---- data queries with fallbacks ------------------------------------- */
  /* [build-05 integrator patch] terrain.size is the FULL extent (world spans
   * +/- size/2, Contract s1 rev A); this function returns the HALF-extent used
   * by w2c/buildRelief as -S..+S. Unpatched, the chart mapped 4x the world
   * and everything bunched in the middle quarter. */
  function worldSize(){
    var s = EF.worldData && EF.worldData.terrain && EF.worldData.terrain.size;
    return (typeof s === 'number' && s > 0) ? s / 2 : 100;
  }
  function sampler(){
    if (eng && typeof eng.groundAt === 'function') return eng.groundAt;
    var t = EF.worldData && EF.worldData.terrain;
    if (t && typeof t.sample === 'function') return t.sample;
    return function(){ return 0; };
  }
  function pois(){
    return (EF.world && EF.world.pois) || (EF.worldData && EF.worldData.pois) || [];
  }
  function player(){ return (EF.state && EF.state.player) || { x:0, z:0, yaw:0 }; }

  var POI_STYLE = {
    village:{ g:'⌂', c:'#c98a3a' }, npc:{ g:'✦', c:'#e8c85a' }, vendor:{ g:'$', c:'#d0a24a' },
    tower:{ g:'♜', c:'#8892a2' }, dungeon:{ g:'☗', c:'#9a5a5a' }, fire:{ g:'✷', c:'#e07a3a' },
    shrine:{ g:'✚', c:'#7ea0c0' }, _def:{ g:'•', c:'#b08a4a' }
  };
  /* [build-05 integrator patch] EF.world.pois carry {id,label} (Contract s1
   * rev A), not {type,name}; fall back so pins get glyphs + captions. */
  function poiStyle(t){ return POI_STYLE[t] || POI_STYLE._def; }
  function poiType(p){ return p.type || p.id; }
  function poiName(p){ return p.name || p.label; }

  /* =======================================================================
   * 1. OFFSCREEN RELIEF  — built once from the height field
   * ===================================================================== */
  var OFF = document.createElement('canvas');
  var DIM = 460;                 // offscreen resolution (square)
  OFF.width = OFF.height = DIM;
  var builtSize = 0, builtOK = false;

  function buildRelief(){
    var S = worldSize(), samp = sampler();
    var g = OFF.getContext('2d');
    var GRID = 150, cell = DIM / GRID;

    // sample height field + track range
    var H = new Float32Array(GRID * GRID), min = Infinity, max = -Infinity, i, j;
    for (j = 0; j < GRID; j++) {
      for (i = 0; i < GRID; i++) {
        var wx = -S + (i / (GRID - 1)) * 2 * S;
        var wz = -S + (j / (GRID - 1)) * 2 * S;
        var h = samp(wx, wz); if (!isFinite(h)) h = 0;
        H[j * GRID + i] = h; if (h < min) min = h; if (h > max) max = h;
      }
    }
    var span = (max - min) || 1;

    // parchment base wash
    g.fillStyle = T.parch; g.fillRect(0, 0, DIM, DIM);

    // hillshade (light from NW) + sepia relief ramp
    function lerpHex(a, b, t){
      var pa=parseInt(a.slice(1),16), pb=parseInt(b.slice(1),16);
      var r=((pa>>16)&255)+(((pb>>16)&255)-((pa>>16)&255))*t;
      var gg=((pa>>8)&255)+(((pb>>8)&255)-((pa>>8)&255))*t;
      var bl=(pa&255)+((pb&255)-(pa&255))*t;
      return 'rgb('+(r|0)+','+(gg|0)+','+(bl|0)+')';
    }
    for (j = 0; j < GRID; j++) {
      for (i = 0; i < GRID; i++) {
        var c = H[j*GRID+i];
        var xr = H[j*GRID + Math.min(GRID-1,i+1)] - c;   // dz/dx
        var zr = H[Math.min(GRID-1,j+1)*GRID + i] - c;   // dz/dy
        var shade = 0.5 + (-(xr + zr)) * 0.9;            // NW light
        shade = Math.max(0, Math.min(1, shade));
        var elev = (c - min) / span;                      // 0..1
        // low ground = greener umber, high ground = pale bone
        var base = lerpHex('#8a7a4a', '#efe3bf', 0.25 + elev*0.6);
        g.fillStyle = base; g.globalAlpha = 1;
        g.fillRect(i*cell, j*cell, cell+1, cell+1);
        // multiply a shadow pass
        g.globalAlpha = (1 - shade) * 0.5;
        g.fillStyle = T.shadow;
        g.fillRect(i*cell, j*cell, cell+1, cell+1);
        g.globalAlpha = 1;
      }
    }

    // contour lines: draw where quantized elevation band changes
    var BANDS = 7;
    g.strokeStyle = 'rgba(90,66,34,.35)'; g.lineWidth = 1;
    function band(v){ return Math.floor(((v - min)/span) * BANDS); }
    g.beginPath();
    for (j = 1; j < GRID; j++) {
      for (i = 1; i < GRID; i++) {
        var b0 = band(H[j*GRID+i]);
        if (b0 !== band(H[j*GRID+i-1])) { g.moveTo(i*cell, j*cell); g.lineTo(i*cell, (j+1)*cell); }
        if (b0 !== band(H[(j-1)*GRID+i])) { g.moveTo(i*cell, j*cell); g.lineTo((i+1)*cell, j*cell); }
      }
    }
    g.stroke();

    // paper grain + vignette
    var grain = 900;
    g.globalAlpha = 0.05;
    for (i = 0; i < grain; i++){ g.fillStyle = (i&1)?'#000':'#fff';
      g.fillRect(Math.random()*DIM, Math.random()*DIM, 1, 1); }
    g.globalAlpha = 1;
    var vg = g.createRadialGradient(DIM/2,DIM/2,DIM*0.30, DIM/2,DIM/2,DIM*0.62);
    vg.addColorStop(0,'rgba(60,40,18,0)'); vg.addColorStop(1,'rgba(40,26,10,.5)');
    g.fillStyle = vg; g.fillRect(0,0,DIM,DIM);

    builtSize = S; builtOK = true;
  }
  function ensureRelief(){ if (!builtOK || builtSize !== worldSize()) buildRelief(); }

  /* =======================================================================
   * 2. QUEST MARKER (map:setMarker)
   * ===================================================================== */
  var marker = null; // { x, z, label }
  bus.on('map:setMarker', function(p){
    if (p && p.__selfTest) return;
    marker = (p && typeof p.x === 'number') ? { x:p.x, z:p.z, label:p.label||'Objective' } : null;
  });

  /* =======================================================================
   * 3. DRAW HELPERS  — world→canvas, arrow, pins
   * ===================================================================== */
  // north (−z) is up; +x right, +z down
  function w2c(x, z, W, Hh){ var S = worldSize();
    return { x:(x + S)/(2*S) * W, y:(z + S)/(2*S) * Hh }; }

  function drawArrow(g, cx, cy, yaw, size, fill){
    var sx = Math.sin(yaw), sz = Math.cos(yaw);          // world forward
    var rot = Math.atan2(sx, -sz);                        // screen up = 0
    g.save(); g.translate(cx, cy); g.rotate(rot);
    g.beginPath(); g.moveTo(0,-size); g.lineTo(size*0.66,size*0.7); g.lineTo(0,size*0.34); g.lineTo(-size*0.66,size*0.7); g.closePath();
    g.fillStyle = fill; g.strokeStyle = 'rgba(20,14,6,.85)'; g.lineWidth = 1.5; g.fill(); g.stroke();
    g.restore();
  }
  function drawPin(g, cx, cy, label, showLabel){
    g.save();
    g.beginPath(); g.arc(cx, cy-9, 7, Math.PI, 0); g.lineTo(cx, cy); g.closePath();
    g.fillStyle = '#c0362f'; g.strokeStyle = 'rgba(20,10,6,.9)'; g.lineWidth = 1.5; g.fill(); g.stroke();
    g.beginPath(); g.arc(cx, cy-9, 2.6, 0, 6.29); g.fillStyle = '#ffe6a0'; g.fill();
    if (showLabel && label){
      g.font = '12px '+T.serif; var tw = g.measureText(label).width;
      g.fillStyle = 'rgba(20,14,6,.82)'; g.fillRect(cx-tw/2-5, cy-30, tw+10, 16);
      g.fillStyle = T.gold; g.textAlign='center'; g.fillText(label, cx, cy-18);
    }
    g.restore();
  }
  function drawPOIs(g, W, Hh, scale){
    pois().forEach(function(p){
      var c = w2c(p.x, p.z, W, Hh), st = poiStyle(poiType(p));
      g.beginPath(); g.arc(c.x, c.y, 4*scale+1, 0, 6.29);
      g.fillStyle = st.c; g.strokeStyle='rgba(20,14,6,.8)'; g.lineWidth=1; g.fill(); g.stroke();
      if (scale >= 1){
        g.font = (11)+'px '+T.serif; g.fillStyle='rgba(30,20,8,.9)'; g.textAlign='center';
        g.fillText(st.g, c.x, c.y+4);
        if (poiName(p)){ g.fillStyle='rgba(35,24,10,.85)'; g.font='11px '+T.serif;
          g.fillText(poiName(p), c.x, c.y+18); }
      }
    });
  }

  /* =======================================================================
   * 4. FULL MAP PANEL
   * ===================================================================== */
  var root = el('div','position:fixed;inset:0;z-index:18;display:none;align-items:center;justify-content:center;'
    + 'background:rgba(6,4,2,.72);pointer-events:auto;font-family:'+T.serif+';');
  var frame = el('div','position:relative;width:min(92vw,520px);aspect-ratio:1/1;max-height:82vh;'
    + 'background:linear-gradient(#2a2013,#14100a);border:3px solid '+T.brass+';border-radius:14px;'
    + 'box-shadow:0 14px 50px rgba(0,0,0,.7),inset 0 0 0 2px rgba(0,0,0,.5);padding:14px;');
  var title = el('div','position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:#1a140a;'
    + 'border:1px solid '+T.brass+';border-radius:6px;padding:2px 14px;color:'+T.gold+';font-size:14px;letter-spacing:2px;','MAP');
  var mapCv = document.createElement('canvas');
  mapCv.style.cssText = 'width:100%;height:100%;display:block;border-radius:8px;';
  var closeX = el('div','position:absolute;top:8px;right:10px;width:60px;height:44px;display:flex;align-items:center;'
    + 'justify-content:center;color:'+T.ink+';font-size:20px;background:rgba(20,14,8,.75);border:1px solid '+T.brassDk+';'
    + 'border-radius:8px;pointer-events:auto;','✕');
  tapEl(closeX, function(){ close(); });
  var legend = el('div','position:absolute;left:16px;bottom:14px;color:'+T.ink+';font-size:11px;line-height:1.6;'
    + 'background:rgba(20,14,8,.6);border:1px solid '+T.brassDk+';border-radius:6px;padding:6px 9px;');
  legend.innerHTML = '<span style="color:#e8c85a">✦</span> NPC &nbsp; <span style="color:#8892a2">♜</span> Tower &nbsp; '
    + '<span style="color:#c0362f">◆</span> Quest &nbsp; <span style="color:#7ec8ff">▲</span> You';
  frame.append(title, mapCv, closeX, legend); root.appendChild(frame);
  document.body.appendChild(root);

  function drawFull(){
    ensureRelief();
    var r = mapCv.getBoundingClientRect();
    var W = Math.max(2, Math.round(r.width)), Hh = Math.max(2, Math.round(r.height));
    if (mapCv.width !== W || mapCv.height !== Hh){ mapCv.width = W; mapCv.height = Hh; }
    var g = mapCv.getContext('2d');
    g.imageSmoothingEnabled = true;
    g.drawImage(OFF, 0, 0, W, Hh);
    // compass rose (NW corner)
    g.save(); g.translate(W-34, 34); g.font='13px '+T.serif; g.fillStyle='rgba(30,20,8,.9)'; g.textAlign='center';
    g.fillText('N', 0, -12); g.strokeStyle='rgba(30,20,8,.7)'; g.lineWidth=1.5;
    g.beginPath(); g.moveTo(0,-9); g.lineTo(0,9); g.moveTo(-9,0); g.lineTo(9,0); g.stroke();
    g.beginPath(); g.moveTo(0,-9); g.lineTo(-3,-3); g.lineTo(3,-3); g.closePath(); g.fillStyle='#c0362f'; g.fill(); g.restore();

    drawPOIs(g, W, Hh, 1.2);
    if (marker){ var m = w2c(marker.x, marker.z, W, Hh); drawPin(g, m.x, m.y, marker.label, true); }
    var pl = player(); var pc = w2c(pl.x, pl.z, W, Hh); drawArrow(g, pc.x, pc.y, pl.yaw||0, 9, '#7ec8ff');
  }

  /* =======================================================================
   * 5. MINIMAP  (corner, ≤5 Hz, north-up)
   * ===================================================================== */
  var mini = document.createElement('canvas');
  var MSZ = 118;
  mini.width = mini.height = MSZ * (Math.min(window.devicePixelRatio||1, 2));
  mini.style.cssText = 'position:fixed;top:calc(62px + env(safe-area-inset-top));right:12px;width:'+MSZ+'px;height:'+MSZ+'px;'
    + 'z-index:11;border-radius:50%;border:2px solid '+T.brass+';box-shadow:0 3px 10px rgba(0,0,0,.5);'
    + 'pointer-events:none;background:'+T.parch+';';
  document.body.appendChild(mini);

  function drawMini(){
    ensureRelief();
    var g = mini.getContext('2d'), W = mini.width, Hh = mini.height;
    g.save();
    // circular clip
    g.beginPath(); g.arc(W/2, Hh/2, W/2, 0, 6.29); g.clip();
    g.imageSmoothingEnabled = true; g.drawImage(OFF, 0, 0, W, Hh);
    // POIs (dots only) + quest + player
    pois().forEach(function(p){ var c = w2c(p.x,p.z,W,Hh), st = poiStyle(poiType(p));
      g.beginPath(); g.arc(c.x,c.y, W*0.03, 0, 6.29); g.fillStyle=st.c; g.fill(); });
    if (marker){ var m = w2c(marker.x, marker.z, W, Hh);
      g.beginPath(); g.arc(m.x, m.y, W*0.05, 0, 6.29); g.fillStyle='#c0362f'; g.strokeStyle='#ffe6a0'; g.lineWidth=2; g.fill(); g.stroke(); }
    var pl = player(); var pc = w2c(pl.x, pl.z, W, Hh); drawArrow(g, pc.x, pc.y, pl.yaw||0, W*0.07, '#7ec8ff');
    g.restore();
    // north tick
    g.fillStyle='#c0362f'; g.beginPath(); g.moveTo(W/2,3); g.lineTo(W/2-4,11); g.lineTo(W/2+4,11); g.closePath(); g.fill();
  }

  /* =======================================================================
   * 6. OPEN / CLOSE + throttled redraw
   * ===================================================================== */
  var open = false;
  function openMap(){ ensureRelief(); root.style.display='flex'; open=true;
    try { bus.emit('ui:menu',{ mode:'menu', open:true }); } catch(_){}
    if (EF.ui) EF.ui.mode='menu';
    drawFull(); }
  function close(){ root.style.display='none'; open=false;
    if (EF.ui && EF.ui.mode==='menu') EF.ui.setMode && EF.ui.setMode('play'); }
  function toggle(){ open ? close() : openMap(); }
  tapEl(root, function(e){ if (e.target === root) close(); }); // tap backdrop to close

  var accMini = 0, accFull = 0;
  bus.on('game:tick', function(t){
    var dt = (t && t.dt) || 0.016;
    accMini += dt; accFull += dt;
    if (accMini >= 0.2 && mini.width){ accMini = 0; if (!open) drawMini(); }   // 5 Hz
    if (open && accFull >= 1/15){ accFull = 0; drawFull(); }                   // smooth arrow while open
  });
  bus.on('game:booted', function(){ ensureRelief(); drawMini(); });
  bus.on('game:resize', function(){ if (open) drawFull(); });

  /* =======================================================================
   * 7. shared DOM helpers (self-contained; no dependency on ui.js internals)
   * ===================================================================== */
  /* [build-05 integrator patch] call sites pass (tag, css, TEXT) -- title
   * 'MAP' and the close glyph -- but this helper dropped the third arg,
   * leaving the close button an empty, invisible box (map unclosable on
   * the phone: the frame covers the backdrop at 402px width). */
  function el(tag, css, txt){ var e = document.createElement(tag); if (css) e.style.cssText = css; if (txt != null) e.textContent = txt; return e; }
  function tapEl(e, fn){
    e.addEventListener('touchstart', function(ev){ ev.preventDefault(); ev.stopPropagation(); fn(ev); }, { passive:false });
    e.addEventListener('click', function(ev){ fn(ev); });
    e.style.touchAction = 'none';
  }

  /* ---- public ---------------------------------------------------------- */
  EF.ui = EF.ui || {};
  EF.ui.map = {
    open: openMap, close: close, toggle: toggle,
    rebuild: function(){ builtOK=false; ensureRelief(); if (open) drawFull(); drawMini(); },
    setMarker: function(x,z,label){ marker = (typeof x==='number') ? { x:x, z:z, label:label||'Objective' } : null; if (open) drawFull(); }
  };
  ensureRelief(); drawMini();
  console.log('[EF.map] ready — relief chart, POIs, quest pin, minimap (5 Hz)');
})();
</script>
<!-- ================= diag.js             QA OVERLAY (diag build only) ================= -->
<script>
/* ============================================================================
 * EMBERFELL -- diag.js  (Integrator/QA overlay, build-05-diag ONLY)
 * Contract v1.1 "Build discipline": error overlay + probes + FPS badge.
 * The phone is the QA rig and cannot otherwise report errors.
 *
 * - No <style> tags (s2.2): every style is el.style.cssText.
 * - No private rAF loop (s5): rides game:tick, throttled to 4 Hz.
 * - Draw calls are read from renderer.info.render.calls (previous frame's
 *   count, since render happens after the tick emit). Budget: <= 60.
 * - Auto-runs EF.engine.selfTest() 2 s after boot; result shown in badge.
 * - NOTE: the overlay allocates strings at 4 Hz while updating its DOM text.
 *   That is a diag-build-only cost and is why this file never ships in the
 *   clean build (CR-2 applies to shipping modules, not the QA rig).
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  var DRAW_BUDGET = 60;
  var counts = { error: 0, warn: 0 };
  var maxCalls = 0, selfTestResult = '--';

  var badge = null, probeLine = null, logPanel = null;

  function makeDom() {
    badge = document.createElement('div');
    badge.style.cssText =
      'position:fixed;top:6px;left:6px;z-index:9999;pointer-events:none;' +
      'font:11px/1.45 monospace;color:#d8f0d8;background:rgba(10,18,14,0.72);' +
      'padding:5px 8px;border-radius:6px;border:1px solid rgba(120,200,140,0.35);' +
      'white-space:pre;max-width:70vw;';
    badge.textContent = '[EF diag] waiting for boot...';
    probeLine = document.createElement('div');
    probeLine.style.cssText =
      'position:fixed;top:6px;right:6px;z-index:9999;pointer-events:none;' +
      'font:10px/1.4 monospace;color:#cfd8e6;background:rgba(10,14,20,0.72);' +
      'padding:4px 7px;border-radius:6px;border:1px solid rgba(130,160,220,0.3);' +
      'white-space:pre;text-align:right;';
    logPanel = document.createElement('div');
    logPanel.style.cssText =
      'position:fixed;left:6px;right:6px;bottom:6px;z-index:9999;display:none;' +
      'pointer-events:none;font:10px/1.4 monospace;color:#ffd7d0;' +
      'background:rgba(30,8,6,0.82);padding:5px 8px;border-radius:6px;' +
      'border:1px solid rgba(255,110,90,0.5);max-height:34vh;overflow:hidden;' +
      'white-space:pre-wrap;word-break:break-all;';
    document.body.appendChild(badge);
    document.body.appendChild(probeLine);
    document.body.appendChild(logPanel);
  }

  var lines = [];
  function pushLog(kind, msg) {
    counts[kind]++;
    if (!logPanel) return;
    lines.push('[' + kind + '] ' + msg);
    if (lines.length > 10) lines.shift();
    logPanel.textContent = lines.join('\n');
    logPanel.style.display = 'block';
  }

  function fmtArgs(args) {
    var out = [];
    for (var i = 0; i < args.length; i++) {
      var a = args[i];
      if (a && a.stack) out.push(String(a.message || a));
      else { try { out.push(typeof a === 'string' ? a : JSON.stringify(a)); }
             catch (e) { out.push(String(a)); } }
    }
    return out.join(' ');
  }

  /* mirror console.error / console.warn into the overlay */
  var origErr = console.error, origWarn = console.warn;
  console.error = function () { pushLog('error', fmtArgs(arguments)); origErr.apply(console, arguments); };
  console.warn = function () { pushLog('warn', fmtArgs(arguments)); origWarn.apply(console, arguments); };
  window.addEventListener('error', function (e) {
    pushLog('error', (e.message || 'script error') + ' @' + (e.filename || '?') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    pushLog('error', 'unhandled rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  function probeText() {
    var ok = function (b) { return b ? 'OK' : 'MISSING'; };
    return 'EF.engine ' + ok(!!EF.engine) +
      ' | EF.world ' + ok(!!EF.world && EF.world.ready) +
      ' | EF.player ' + ok(!!EF.player) +
      '\nEF.combat ' + ok(!!EF.combat) +
      ' | EF.enemies ' + ok(!!EF.enemies) + (EF.enemies ? ' (' + EF.enemies.pool.length + ')' : '') +
      '\nEF.npcs ' + ok(!!EF.npcs) + ' | EF.quests ' + ok(!!EF.quests) + ' | EF.ui ' + ok(!!EF.ui) +
      '\nselfTest: ' + selfTestResult;
  }

  var acc = 0;
  function onTick(t) {
    if (t && t.__selfTest) return;
    acc += t.dt;
    if (acc < 0.25) return;
    acc = 0;
    var time = EF.engine.time;
    var info = EF.engine.renderer ? EF.engine.renderer.info.render : null;
    var calls = info ? info.calls : 0;
    if (calls > maxCalls) maxCalls = calls;
    var budget = maxCalls <= DRAW_BUDGET ? 'PASS' : 'OVER BUDGET';
    badge.textContent =
      'EMBERFELL build-05-diag\n' +
      'fps ' + time.fps + '  frame ' + time.frame + '\n' +
      'draw calls ' + calls + '  max ' + maxCalls + '/' + DRAW_BUDGET + ' ' + budget + '\n' +
      (info ? 'tris ' + info.triangles + '\n' : '') +
      (EF.player ? 'hp ' + Math.round(EF.player.stats.hp) + '/' + EF.player.stats.maxhp +
        '  st ' + Math.round(EF.player.stats.st) + '  lvl ' + EF.player.stats.lvl + '\n' : '') +
      'phase ' + (EF.world && EF.world.getTimePhase ? EF.world.getTimePhase() : '--') +
      '  err ' + counts.error + '  warn ' + counts.warn;
    probeLine.textContent = probeText();
  }

  EF.bus.on('game:booted', function (p) {
    if (p && p.__selfTest) return;
    if (!badge) makeDom();
    EF.bus.on('game:tick', onTick);
    setTimeout(function () {
      try {
        var r = EF.engine.selfTest();
        selfTestResult = (r.pass ? 'PASS' : 'FAIL') + ' (' + r.results.length + ' events)';
      } catch (e) { selfTestResult = 'THREW: ' + e.message; }
    }, 2000);
  });

  /* if boot already happened (script order safety) */
  if (EF.engine && EF.engine.booted) {
    makeDom();
    EF.bus.on('game:tick', onTick);
  }
})();
</script>
