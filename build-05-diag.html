    for (r = 0; r < roster.length; r++) {
      var entry = roster[r], typeId = entry.type, count = entry.count;
      var def = EF.data.enemyTypes.get(typeId);
      var rig = RIGS[typeId]();

      // one InstancedMesh for this type's static body
      var bodyIM = new THREE.InstancedMesh(rig.body, BODY_MAT, count);
      bodyIM.frustumCulled = false; scene.add(bodyIM);
      bodyIMs.push(bodyIM); allIMs.push(bodyIM);

      // pack slots that share a geometry into ONE InstancedMesh (e.g. a wolf's
      // 4 legs -> a single batch of count*4 instances)
      var groups = [], gi, sl;
      for (sl = 0; sl < rig.slots.length; sl++) {
        var sd = rig.slots[sl], grp = null;
        for (gi = 0; gi < groups.length; gi++) { if (groups[gi].geo === sd.geo) { grp = groups[gi]; break; } }
        if (!grp) { grp = { geo: sd.geo, members: [] }; groups.push(grp); }
        grp.members.push(sd);
      }
      for (gi = 0; gi < groups.length; gi++) {
        var g = groups[gi];
        g.im = new THREE.InstancedMesh(g.geo, BODY_MAT, count * g.members.length);
        g.im.frustumCulled = false; scene.add(g.im);
        limbIMs.push(g.im); allIMs.push(g.im);
      }

      // create the logical enemies for this type
      for (var n = 0; n < count; n++) {
        var e = {
          id: typeId + '-' + (++idCounter), typeId: typeId, def: def,
          x: 0, z: 0, yaw: 0, groundY: 0,
          hp: def.maxhp, maxhp: def.maxhp, alive: true, state: 'idle',
          wanderT: 0, tx: 0, tz: 0,
          atkPhase: 'none', atkT: 0, cooldownT: 0, struck: false,
          orbitSign: Math.random() < 0.5 ? 1 : -1,
          lungeT: 0, lungeVX: 0, lungeVZ: 0,
          deadT: 0, rollZ: 0, sinkY: 0, walkPhase: Math.random() * 6,
          legSwing: 0, armSwing: 0, telePose: 0,
          zone: entry.zone, biome: entry.biome, _hitSwing: -1,
          bodyIM: bodyIM, bodyIdx: n, barIdx: barIdx++,
          _m: new THREE.Matrix4()
        };
        // register this enemy's animated limbs; instance index packs
        // (enemyIndex, memberIndex) within each group's InstancedMesh
        for (gi = 0; gi < groups.length; gi++) {
          var gr = groups[gi], gl = gr.members.length;
          for (var mi = 0; mi < gl; mi++) {
            var lm = gr.members[mi];
            animLimbs.push({ im: gr.im, idx: n * gl + mi, e: e, ox: lm.ox, oy: lm.oy, oz: lm.oz, role: lm.role, sign: lm.sign });
          }
        }
        pool.push(e);
        respawn(e);
      }
    }
    console.log('[EF.enemies] pool ready: ' + pool.length + ' enemies, ' +
      (allIMs.length + 2) + ' draw calls (' + bodyIMs.length + ' bodies + ' +
      limbIMs.length + ' limb batches + 2 bars)');
  });

  /* ===================== public API (unchanged surface) ===================== */
  EF.enemies = {
    pool: pool,
    each: function (fn) { for (var i = 0; i < pool.length; i++) fn(pool[i], i); },
    applyKnockback: function (e, nx, nz, impulse) { e.x += nx * impulse * 0.18; e.z += nz * impulse * 0.18; },
    kill: function (e) {
      if (!e.alive) return;
      e.alive = false; e.state = 'dead'; e.deadT = 0; e.atkPhase = 'none';
      bus.emit('enemy:died', { type: e.typeId, id: e.id });
    },
    drawCalls: function () { return allIMs.length + 2; }
  };
})();
</script>

<script>
/* ============================================================================
 * EMBERFELL — combat.js  (Combat dept, Cycle 2)
 * THE math authority (Contract v1.1 §5): ALL damage, xp, gold, and level math
 * live here, and combat.js is the ONLY writer of hp — both the player's and
 * every enemy's. Owns swing timing (wind-up / active hit window / recover),
 * arc test, knockback, level-scaled crit, player:levelup with stat growth, and
 * damage-number emission for UI popups.
 *
 * Reads swing input, player pose/weapon, and enemy pool; writes hp and stats;
 * tells enemies.js to kill(), tells player.js to respawnAt(). Emits:
 *   enemy:died (via enemies.kill), player:damaged, player:died, player:levelup,
 *   loot:collected, ui:toast, camera:shake, audio:play, and combat:damage
 *   (floating damage numbers — pre-approval pending; warns once until Engine
 *   Core adds it to CANONICAL_EVENTS).
 *
 * Load order: LAST (after player.js and enemies.js). Depends on THREE (r128),
 * EF.engine (bus/input/audio/time/camera), EF.player, EF.enemies,
 * EF.data.weapons.
 * A-1 note: attack is tap-triggered via wasPressed('attack'); no hold/charge.
 * Delivery: raw .js text, ASCII quotes only (Contract v1.1 §2.5).
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.engine) { console.error('[EF.combat] engine.js must load before combat.js'); return; }
  var bus = EF.engine.bus, input = EF.engine.input;

  /* register combat sfx (engine ships jump/hit/hurt/pickup/ui.click already) */
  (function registerSfx() {
    var A = EF.engine.audio;
    A.register('swing.light', { type: 'sawtooth', freq: 520, freqEnd: 300, duration: 0.10, gain: 0.10 });
    A.register('swing.mid',   { type: 'sawtooth', freq: 300, freqEnd: 150, duration: 0.14, gain: 0.14 });
    A.register('swing.heavy', { type: 'sawtooth', freq: 180, freqEnd: 80,  duration: 0.22, gain: 0.18 });
    A.register('enemy.hit',   { type: 'square',   freq: 160, freqEnd: 70,  duration: 0.12, gain: 0.16 });
    A.register('crit',        { type: 'square',   freq: 900, freqEnd: 300, duration: 0.16, gain: 0.20 });
    A.register('levelup',     { type: 'triangle', freq: 440, freqEnd: 880, duration: 0.30, gain: 0.20 });
    A.register('loot.gold',   { type: 'square',   freq: 880, freqEnd: 1320,duration: 0.10, gain: 0.14 });
  })();

  function sfx(name) { bus.emit('audio:play', { sfx: name }); }

  /* ==================== LEVEL / STAT MATH ==================== */
  var CRIT_PER_LEVEL = 0.02, CRIT_CAP = 0.5, CRIT_MULT = 2.0;

  function critChance(weaponDef) {
    var s = EF.player.stats;
    var base = CRIT_PER_LEVEL * (s.lvl - 1) + (weaponDef ? weaponDef.critBonus : 0);
    return Math.max(0, Math.min(CRIT_CAP, base));
  }

  function rollDamage(weaponDef, crit) {
    var s = EF.player.stats;
    var lo = weaponDef.damage[0], hi = weaponDef.damage[1];
    var base = lo + Math.random() * (hi - lo);
    // player attack power (s.dmg) scales the weapon's base band
    var scaled = base * (s.dmg / 20);
    if (crit) scaled *= CRIT_MULT;
    return Math.round(scaled);
  }

  function gainXp(n) {
    var s = EF.player.stats;
    s.xp += n;
    while (s.xp >= s.xpNext) {
      s.xp -= s.xpNext;
      s.lvl++;
      s.xpNext = Math.floor(s.xpNext * 1.5);
      // stat growth
      s.maxhp += 20; s.hp = s.maxhp;          // heal to full on level
      s.maxst += 5;  s.st = s.maxst;
      s.dmg += 6;
      sfx('levelup');
      bus.emit('player:levelup', { level: s.lvl });
      bus.emit('ui:toast', { text: 'Level ' + s.lvl + '!' });
    }
  }

  function awardGold(min, max) {
    var s = EF.player.stats;
    var g = Math.floor(min + Math.random() * (max - min + 1));
    s.gold += g;
    sfx('loot.gold');
    bus.emit('loot:collected', { item: 'gold', count: g });
    return g;
  }

  /* ==================== ENEMY HP (combat is sole writer) ==================== */
  function damageEnemy(e, amount, crit, nx, nz, weaponDef) {
    e.hp -= amount;                             // <-- the ONLY enemy hp write
    bus.emit('combat:damage', {
      amount: amount, crit: !!crit, target: 'enemy',
      position: { x: e.x, y: groundAt(e.x, e.z) + (e.def.barY + 0.3), z: e.z }
    });
    EF.enemies.applyKnockback(e, nx, nz, weaponDef.knockback * (crit ? 1.5 : 1));
    if (e.hp <= 0 && e.alive) {
      EF.enemies.kill(e);                       // enemies.kill emits enemy:died
      gainXp(e.def.xp);
      awardGold(e.def.gold[0], e.def.gold[1]);
      if (Math.random() < e.def.potionChance) {
        bus.emit('loot:collected', { item: 'potion', count: 1 });
        bus.emit('ui:toast', { text: '+1 Potion' });
      }
    }
  }

  function groundAt(x, z) {
    if (EF.world && typeof EF.world.terrainH === 'function') return EF.world.terrainH(x, z);
    if (EF.engine && typeof EF.engine.groundAt === 'function') return EF.engine.groundAt(x, z);
    return 0;
  }

  /* ==================== SWING STATE MACHINE ==================== */
  var swing = { active: false, phase: 'idle', t: 0, t01: 0, weapon: null, id: 0, hitDone: false };

  function tryStartSwing() {
    if (swing.active || isPlayerDead) return;
    var w = EF.player.getWeapon();
    if (!w) return;
    if (!EF.player.trySpendStamina(w.stamina)) return;   // player owns stamina
    swing.active = true;
    swing.phase = 'windup';
    swing.t = 0; swing.t01 = 0;
    swing.weapon = w;
    swing.id++;
    swing.hitDone = false;
    sfx(w.sfx);
  }

  function updateSwing(dt) {
    if (!swing.active) return;
    var w = swing.weapon;
    var total = w.windup + w.active + w.recover;
    swing.t += dt;
    swing.t01 = Math.min(1, swing.t / total);

    if (swing.t < w.windup) {
      swing.phase = 'windup';
    } else if (swing.t < w.windup + w.active) {
      swing.phase = 'active';
      if (!swing.hitDone) { swing.hitDone = true; resolveHit(w); }  // hit window
    } else if (swing.t < total) {
      swing.phase = 'recover';
    } else {
      swing.active = false; swing.phase = 'idle'; swing.weapon = null;
    }
  }

  /* arc + reach test against the enemy pool. No allocation. */
  function resolveHit(w) {
    var pp = EF.player.position;
    var px = pp.x, pz = pp.z, yaw = pp.yaw;
    var fx = Math.sin(yaw), fz = Math.cos(yaw);       // player forward
    var cosHalf = Math.cos(w.arc * 0.5);
    var crit = Math.random() < critChance(w);
    var hitAny = false;
    var pool = EF.enemies.pool;

    for (var i = 0; i < pool.length; i++) {
      var e = pool[i];
      if (!e.alive || e._hitSwing === swing.id) continue;
      var dx = e.x - px, dz = e.z - pz;
      var d = Math.sqrt(dx * dx + dz * dz);
      if (d > w.reach + e.def.contactRadius) continue;
      var nx = dx / (d || 1), nz = dz / (d || 1);
      var dot = nx * fx + nz * fz;
      if (dot < cosHalf) continue;                    // outside the arc
      e._hitSwing = swing.id;
      var dmg = rollDamage(w, crit);
      damageEnemy(e, dmg, crit, nx, nz, w);
      hitAny = true;
    }

    if (hitAny) {
      sfx(crit ? 'crit' : 'enemy.hit');
      // heavier weapons and crits sell weight with a small camera shake
      var shake = (crit ? 0.28 : 0.12) + w.knockback * 0.02;
      bus.emit('camera:shake', { intensity: Math.min(0.5, shake), duration: 0.18 });
    }
  }

  /* ==================== PLAYER HP (combat is sole writer) ==================== */
  var isPlayerDead = false;
  var hurtCd = 0;
  var IFRAMES = 0.6;

  function hurtPlayer(amount, sourceType) {
    if (isPlayerDead || hurtCd > 0) return;
    var s = EF.player.stats;
    hurtCd = IFRAMES;
    s.hp -= amount;                              // <-- the ONLY player hp write
    bus.emit('player:damaged', { amount: amount, source: sourceType || 'unknown' });
    bus.emit('combat:damage', {
      amount: amount, crit: false, target: 'player',
      position: { x: EF.player.position.x, y: EF.player.position.y + 2.2, z: EF.player.position.z }
    });
    sfx('hurt');
    if (s.hp <= 0) {
      s.hp = 0;
      isPlayerDead = true;
      bus.emit('player:died', { cause: sourceType || 'unknown' });
      bus.emit('ui:toast', { text: 'You died' });
    }
  }

  function respawn(x, z) {
    var s = EF.player.stats;
    isPlayerDead = false; hurtCd = IFRAMES + 0.6;
    s.hp = s.maxhp; s.st = s.maxst;
    EF.player.respawnAt(x != null ? x : 0, z != null ? z : 8);
  }

  function heal(amount) {
    if (isPlayerDead) return;
    var s = EF.player.stats;
    s.hp = Math.min(s.maxhp, s.hp + amount);
    bus.emit('combat:damage', {
      amount: amount, crit: false, target: 'heal',
      position: { x: EF.player.position.x, y: EF.player.position.y + 2.2, z: EF.player.position.z }
    });
  }

  /* ==================== TICK ==================== */
  bus.on('game:tick', function (t) {
    if (t && t.__selfTest) return;
    var dt = t.dt;
    if (hurtCd > 0) hurtCd -= dt;
    if (input.buttons.wasPressed('attack')) tryStartSwing();
    updateSwing(dt);
  });

  /* ==================== PUBLIC API ==================== */
  EF.combat = {
    // read model for player.js arm animation (returns stable object, no alloc)
    getSwing: function () { return swing; },
    isPlayerDead: function () { return isPlayerDead; },
    // enemies.js calls this on a landed strike instead of touching player hp
    hurtPlayer: hurtPlayer,
    heal: heal,
    respawn: respawn,
    // exposed for UI/inventory hooks
    gainXp: gainXp,
    critChance: critChance
  };
})();
</script>

<script>
/* ============================================================================
 * EMBERFELL - data/dialogue.js  (Quests & NPCs dept, Cycle 3)
 * Pure data. The dialogue RUNNER lives in npcs.js; this file is only lines.

 * Voice note: rural, weathered, a little dry. Two to three sentences a node,

 * ---- SCHEMA (read by npcs.js runner) --------------------------------------
 * EF.dialogue.npc[npcId] = {
 *   name     : display name shown as the speaker.
 *   branches : ordered list. The runner asks EF.quests.getState(quest) and

 *   nodes    : { nodeId: { text, choices:[choice] } }
 *     choice = { label, action, ... }
 *       action:'accept', quest:<id>   -> EF.quests.accept + track
 *       action:'turnIn', quest:<id>   -> EF.quests.turnIn(quest, thisNpc)

 * -------------------------------------------------------------------------- */

      talia: {

<!-- ================= quests.js              Cycle 3  (Quests & NPCs) ================= -->
<script>
/* ============================================================================
 * EMBERFELL - quests.js  (Quests & NPCs dept, Cycle 3)
 * A GENERIC quest state machine that executes Contract SS6 quest data
 * (data/questData.js). It owns NO content: names, lines, counts and rewards
 * all come from data. It tracks progress purely from canonical events.
 *
 * Requires (load order): engine.js (EF.bus/EF.engine), world.js (EF.world.pois,
 * terrainH, spawnPickup), data/questData.js. NPC positions and dialogue come
 * from npcs.js / data/dialogue.js, loaded after this.
 *
 * Contract v1.1 compliance:
 *   SS4 - listens to canonical events only: enemy:died, loot:collected,
 *         game:tick. Emits quest:started / quest:updated / quest:completed,
 *         ui:toast, audio:play, and map:setMarker (pre-approved SS4 addition).
 *         Every handler ignores __selfTest payloads.
 *   SS2 - ASCII quotes; console.log/warn/error only; no per-frame allocation
 *         in the tick path (goto scan is throttled and allocation-free).
 *
 * PITFALL (owned): we NEVER count kills ourselves with a private tally. There
 * is no EF.state.kills in this build, so the authoritative source is the event
 * stream: each active kill objective increments only in response to
 * 'enemy:died'. If this module is reloaded mid-quest, no desynced counter can
 * survive to double-count, because there is no counter to survive - progress
 * is rebuilt from the events that arrive after load. (If a Player dept later
 * ships EF.state.kills, swap the enemy:died handler for a delta read; the rest
 * of the machine is unchanged.)
 *
 * PUBLIC API (EF.quests):
 *   flags                      mutable bag of world flags (e.g. towerOpened).
 *   getState(id)               'locked'|'offerable'|'active'|'ready'|'done'.
 *   isOfferable(id)            convenience boolean.
 *   accept(id)                 -> bool. Starts it, spawns any collect pickups,
 *                                 emits quest:started, tracks it.
 *   turnIn(id, byNpc?)         completes a matching talk objective for byNpc if
 *                                 pending, then finalizes if all objectives met.
 *   abandon(id)                resets to not-accepted; pickups removed; re-accept
 *                                 works clean.
 *   track(id|null)             sets the single tracked quest that shows a marker.
 *   tracked                    current tracked id (read-only-ish).
 *   activeList()               [id,...] of accepted-but-not-done quests.
 *   progress(id)               0..1 overall objective fraction.
 *   objectiveText(id)          array of HUD lines with have/need.
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.bus || !EF.engine) {
    console.error('[EF.quests] engine.js (EF.bus/EF.engine) must load first');
    return;
  }
  if (!EF.questData) {
    console.error('[EF.quests] data/questData.js must load before quests.js');
    return;
  }

  var DATA = EF.questData.quests;
  var bus = EF.bus;

  /* records[id] = { status, obj:[{have, done}], pickups:[handle] } */
  var records = Object.create(null);
  var GOTO_INTERVAL = 0.25;      // seconds between goto proximity scans
  var _gotoAccum = 0;

  var api = {
    flags: Object.create(null),
    tracked: null
  };
  EF.quests = api;

  /* ---------------------------------------------------------------- utils */

  function def(id) { return DATA[id] || null; }

  function poiById(id) {
    var pois = (EF.world && EF.world.pois) || [];
    for (var i = 0; i < pois.length; i++) if (pois[i].id === id) return pois[i];
    return null;
  }

  function newRecord(q) {
    var obj = [];
    for (var i = 0; i < q.objectives.length; i++) obj.push({ have: 0, done: false });
    return { status: 'active', obj: obj, pickups: [] };
  }

  function objComplete(q, rec, i) {
    var o = q.objectives[i], r = rec.obj[i];
    if (o.type === 'kill' || o.type === 'collect') return r.have >= o.count;
    return r.done === true; // goto / talk
  }

  function allComplete(q, rec) {
    for (var i = 0; i < q.objectives.length; i++) if (!objComplete(q, rec, i)) return false;
    return true;
  }

  function requiresMet(q) {
    var req = q.requires;
    if (!req || !req.length) return true;
    for (var i = 0; i < req.length; i++) if (api.getState(req[i]) !== 'done') return false;
    return true;
  }

  /* --------------------------------------------------------------- states */

  api.getState = function (id) {
    var q = def(id);
    if (!q) return 'locked';
    var rec = records[id];
    if (rec) {
      if (rec.status === 'done') return 'done';
      return allComplete(q, rec) ? 'ready' : 'active';
    }
    return requiresMet(q) ? 'offerable' : 'locked';
  };

  api.isOfferable = function (id) { return api.getState(id) === 'offerable'; };

  api.activeList = function () {
    var out = [];
    for (var id in records) if (records[id].status !== 'done') out.push(id);
    return out;
  };

  api.progress = function (id) {
    var q = def(id), rec = records[id];
    if (!q || !rec) return 0;
    var have = 0, need = 0;
    for (var i = 0; i < q.objectives.length; i++) {
      var o = q.objectives[i];
      if (o.type === 'kill' || o.type === 'collect') { need += o.count; have += Math.min(rec.obj[i].have, o.count); }
      else { need += 1; have += rec.obj[i].done ? 1 : 0; }
    }
    return need ? have / need : 0;
  };

  api.objectiveText = function (id) {
    var q = def(id), rec = records[id];
    if (!q) return [];
    var lines = [];
    for (var i = 0; i < q.objectives.length; i++) {
      var o = q.objectives[i];
      var base = o.desc || o.type;
      if (o.type === 'kill' || o.type === 'collect') {
        var have = rec ? Math.min(rec.obj[i].have, o.count) : 0;
        lines.push(base + ' (' + have + '/' + o.count + ')');
      } else {
        lines.push(base + (rec && rec.obj[i].done ? ' (done)' : ''));
      }
    }
    return lines;
  };

  /* -------------------------------------------------------------- markers */
  /* Only the tracked quest ever emits a marker. Target POI is authored in
   * questData.marker: turnin when ready, else active (kill quests author
   * active:null, so we fall back to the giver/turnin POI). */

  function markerTargetId(id) {
    var q = def(id), rec = records[id];
    if (!q || !rec) return null;
    var m = q.marker || {};
    if (rec.status === 'done') return null;
    if (allComplete(q, rec)) return m.turnin || m.active || null;
    return m.active || m.turnin || null;
  }

  function emitMarker() {
    if (!api.tracked) { bus.emit('map:setMarker', { clear: true }); return; }
    var poiId = markerTargetId(api.tracked);
    var poi = poiId && poiById(poiId);
    if (!poi) { bus.emit('map:setMarker', { clear: true }); return; }
    bus.emit('map:setMarker', {
      questId: api.tracked, label: poi.label,
      x: poi.x, y: poi.y, z: poi.z, radius: poi.radius
    });
  }

  api.track = function (id) {
    if (id && records[id] && records[id].status !== 'done') api.tracked = id;
    else if (id == null) api.tracked = null;
    else api.tracked = id; // allow tracking a ready quest too
    emitMarker();
  };

  function retrackAfter(id) {
    if (api.tracked !== id) return;
    var live = api.activeList();
    api.tracked = live.length ? live[0] : null;
    emitMarker();
  }

  /* --------------------------------------------------------- accept / turn */

  api.accept = function (id) {
    var q = def(id);
    if (!q) { console.warn('[EF.quests] accept unknown quest "' + id + '"'); return false; }
    if (api.getState(id) !== 'offerable') {
      console.warn('[EF.quests] "' + id + '" is not offerable (' + api.getState(id) + ')');
      return false;
    }
    var rec = newRecord(q);
    records[id] = rec;
    spawnCollectPickups(q, rec);
    bus.emit('quest:started', { id: id });
    bus.emit('quest:updated', { id: id, progress: api.progress(id) });
    bus.emit('ui:toast', { text: 'Quest: ' + q.title });
    api.track(id);
    return true;
  };

  api.turnIn = function (id, byNpc) {
    var q = def(id), rec = records[id];
    if (!q || !rec || rec.status === 'done') return false;

    // a delivery/talk objective is satisfied by handing in AT the target npc
    if (byNpc) {
      for (var i = 0; i < q.objectives.length; i++) {
        var o = q.objectives[i];
        if (o.type === 'talk' && o.npc === byNpc && !rec.obj[i].done) {
          rec.obj[i].done = true;
          bus.emit('quest:updated', { id: id, progress: api.progress(id) });
        }
      }
    }
    if (!allComplete(q, rec)) {
      // not ready yet - keep it active, just acknowledge
      return false;
    }
    finalize(id);
    return true;
  };

  function finalize(id) {
    var q = def(id), rec = records[id];
    if (!q || !rec || rec.status === 'done') return;
    rec.status = 'done';
    removePickups(rec);

    // rewards: gold/xp are the Player dept's ledger. We announce via ui:toast
    // and quest:completed; a Player module can read questData[id].reward on
    // quest:completed to credit the purse. We do not invent a reward event.
    var r = q.reward || {};
    var bits = [];
    if (r.gold) bits.push('+' + r.gold + ' gold');
    if (r.xp) bits.push('+' + r.xp + ' XP');
    if (r.item) bits.push(r.item);

    if (q.onComplete) {
      if (q.onComplete.setFlags) {
        for (var f in q.onComplete.setFlags) api.flags[f] = q.onComplete.setFlags[f];
      }
      if (q.onComplete.toast) bus.emit('ui:toast', { text: q.onComplete.toast });
    }

    bus.emit('quest:updated', { id: id, progress: 1 });
    bus.emit('quest:completed', { id: id });
    bus.emit('ui:toast', { text: 'Complete: ' + q.title + (bits.length ? ' - ' + bits.join(', ') : '') });
    bus.emit('audio:play', { sfx: 'quest' });

    retrackAfter(id);
  }

  api.abandon = function (id) {
    var q = def(id), rec = records[id];
    if (!q || !rec || rec.status === 'done') return false;
    removePickups(rec);
    delete records[id];
    bus.emit('ui:toast', { text: 'Abandoned: ' + q.title });
    retrackAfter(id);
    return true;
  };

  /* ------------------------------------------------------------- pickups */

  function spawnCollectPickups(q, rec) {
    for (var i = 0; i < q.objectives.length; i++) {
      var o = q.objectives[i];
      if (o.type !== 'collect' || !o.spawn) continue;
      var sp = o.spawn;
      var poi = poiById(sp.poi);
      if (!poi) { console.warn('[EF.quests] collect spawn: no poi "' + sp.poi + '"'); continue; }
      if (!EF.world || typeof EF.world.spawnPickup !== 'function' || !EF.world.ready) {
        console.warn('[EF.quests] world not ready to spawn "' + o.item + '"; objective still counts drops');
        continue;
      }
      var n = sp.n || o.count;
      var scatter = sp.scatter || 5;
      for (var k = 0; k < n; k++) {
        var a = (k / n) * Math.PI * 2 + Math.random() * 0.8;
        var d = scatter * (0.55 + Math.random() * 0.45);
        var x = poi.x + Math.cos(a) * d;
        var z = poi.z + Math.sin(a) * d;
        var h = EF.world.spawnPickup(o.item, x, z);
        if (h) rec.pickups.push(h);
      }
    }
  }

  function removePickups(rec) {
    for (var i = 0; i < rec.pickups.length; i++) {
      try { if (rec.pickups[i] && rec.pickups[i].remove) rec.pickups[i].remove(); }
      catch (e) { /* pickup already gone */ }
    }
    rec.pickups.length = 0;
  }

  /* --------------------------------------------------- event: kills ----- */

  bus.on('enemy:died', function (p) {
    if (!p || p.__selfTest) return;
    var type = p.type;
    var changed = null;
    for (var id in records) {
      var rec = records[id];
      if (rec.status === 'done') continue;
      var q = def(id);
      for (var i = 0; i < q.objectives.length; i++) {
        var o = q.objectives[i];
        if (o.type === 'kill' && o.target === type && rec.obj[i].have < o.count) {
          rec.obj[i].have++;
          changed = id;
          bus.emit('quest:updated', { id: id, progress: api.progress(id) });
          checkReady(id);
        }
      }
    }
    if (changed) refreshMarkerIfTracked(changed);
  });

  /* ----------------------------------------------- event: collect ------- */

  bus.on('loot:collected', function (p) {
    if (!p || p.__selfTest) return;
    var item = p.item, amt = p.count || 1;
    var changed = null;
    for (var id in records) {
      var rec = records[id];
      if (rec.status === 'done') continue;
      var q = def(id);
      for (var i = 0; i < q.objectives.length; i++) {
        var o = q.objectives[i];
        if (o.type === 'collect' && o.item === item && rec.obj[i].have < o.count) {
          rec.obj[i].have = Math.min(o.count, rec.obj[i].have + amt);
          changed = id;
          bus.emit('quest:updated', { id: id, progress: api.progress(id) });
          checkReady(id);
        }
      }
    }
    if (changed) refreshMarkerIfTracked(changed);
  });

  /* --------------------------------------------- tick: goto proximity --- */

  bus.on('game:tick', function (t) {
    if (!t || t.__selfTest) return;
    _gotoAccum += t.dt;
    if (_gotoAccum < GOTO_INTERVAL) return;
    _gotoAccum = 0;

    var pos = EF.player && EF.player.position;
    if (!pos) return; // no player root yet - nothing to test against

    for (var id in records) {
      var rec = records[id];
      if (rec.status === 'done') continue;
      var q = def(id);
      for (var i = 0; i < q.objectives.length; i++) {
        var o = q.objectives[i];
        if (o.type !== 'goto' || rec.obj[i].done) continue;
        var poi = poiById(o.poi);
        if (!poi) continue;
        var rad = o.radius != null ? o.radius : poi.radius;
        var dx = pos.x - poi.x, dz = pos.z - poi.z;
        if (dx * dx + dz * dz <= rad * rad) {
          rec.obj[i].done = true;
          bus.emit('quest:updated', { id: id, progress: api.progress(id) });
          checkReady(id);
          refreshMarkerIfTracked(id);
        }
      }
    }
  });

  /* --------------------------------------------------------- readiness -- */

  function checkReady(id) {
    var q = def(id), rec = records[id];
    if (!q || !rec || rec.status === 'done') return;
    if (allComplete(q, rec)) {
      if (q.autoComplete) finalize(id);        // e.g. the tower door
      else {
        bus.emit('ui:toast', { text: 'Ready to turn in: ' + q.title });
        bus.emit('audio:play', { sfx: 'quest' });
      }
    }
  }

  function refreshMarkerIfTracked(id) { if (api.tracked === id) emitMarker(); }

  /* --------------------------------------------------------- boot chores- */

  bus.on('game:booted', function (p) {
    if (p && p.__selfTest) return;
    // a soft, low chime for quest beats; register once here.
    try {
      EF.engine.audio.register('quest', { type: 'sine', freq: 520, freqEnd: 780, duration: 0.16, gain: 0.16, attack: 0.01 });
    } catch (e) { /* audio optional */ }
  });

  console.log('[EF.quests] ready - ' + EF.questData.order.length + ' quests loaded');
})();
</script>

<script>
/* ============================================================================
 * EMBERFELL - npcs.js  (Quests & NPCs dept, Cycle 3)
 * NPC registry + a shared low-poly humanoid factory (palette + accessory
 * variation), idle behaviours (face the player when near, wander a leash
 * radius, sit by the fire at night), and the dialogue RUNNER that executes
 * data/dialogue.js and resolves choices against EF.quests.
 *
 * Requires (load order): THREE r128, engine.js, world.js (pois/terrainH/
 * getTimePhase), data/questData.js, data/dialogue.js, quests.js. Reads
 * EF.player.position for proximity (guarded - degrades gracefully if absent).
 *
 * Contract v1.1 compliance:
 *   SS4 - emits dialogue:open / dialogue:close and listens for dialogue:choice
 *         (pre-approved SS4 additions); also emits quest:offered when an offer
 *         node opens, and audio:play. Ignores __selfTest payloads.
 *   SS5 - no private rAF loop; all motion runs off 'game:tick'. Models are
 *         built on 'game:booted'.
 *   SS2 - ASCII quotes; console.log/warn/error only; POI-anchored placement -
 *         NO literal world coordinates (offsets are relative to EF.world.pois).
 *
 * PUBLIC API (EF.npcs):
 *   list                 [npcId, ...]
 *   get(id)              runtime record { id, group, home, ... } or null
 *   interact()           open dialogue with the nearest NPC in range (or false)
 *   openWith(id)         force-open a specific NPC's dialogue
 *   choose(choiceId)     pick a choice in the open dialogue
 *   nearest()            { id, dist } of the closest NPC to the player, or null
 *   INTERACT_RADIUS      metres
 * ========================================================================= */
(function () {
  'use strict';
  if (typeof THREE === 'undefined') {
    console.error('[EF.npcs] THREE (r128) must load before npcs.js');
    return;
  }
  var EF = (window.EF = window.EF || {});
  if (!EF.bus || !EF.engine) { console.error('[EF.npcs] engine.js must load first'); return; }
  if (!EF.dialogue) { console.error('[EF.npcs] data/dialogue.js must load first'); return; }
  if (!EF.quests) { console.error('[EF.npcs] quests.js must load first'); return; }

  var bus = EF.bus;

  /* ---- placement: every NPC anchored to a POI + a small local offset ---
   * dx/dz are relative to the POI centre from EF.world.pois, never absolute
   * world coordinates. seatA is a ring angle around the village fire for the
   * "sit by the fire at night" behaviour (village folk only). */
  var DEFS = {
    maren: {
      name: 'Maren', poi: 'village', dx: 1.8, dz: 1.0, leash: 2.2, firesit: true, seatA: 0.4,
      palette: { skin: 0xd9b48a, cloth: 0x6a5a48, trim: 0x9a8a63, hair: 0xcfcabf },
      accessory: ['shawl', 'stick']
    },
    odda: {
      name: 'Odda', poi: 'village', dx: 4.4, dz: -4.4, leash: 3.0, firesit: true, seatA: 2.0,
      palette: { skin: 0xcaa079, cloth: 0x40613f, trim: 0x8fae5a, hair: 0x5a4630 },
      accessory: ['apron', 'satchel']
    },
    gethin: {
      name: 'Gethin', poi: 'village', dx: -6.2, dz: 0.6, leash: 2.6, firesit: true, seatA: 3.5,
      palette: { skin: 0xc79a70, cloth: 0x3f4a63, trim: 0x6d7686, hair: 0x9a958c },
      accessory: ['staff']
    },
    corin: {
      name: 'Corin', poi: 'village', dx: 5.6, dz: 2.0, leash: 3.4, firesit: true, seatA: 5.1,
      palette: { skin: 0xd2a882, cloth: 0x7a6a3f, trim: 0xb0a05a, hair: 0x2f2822 },
      accessory: ['satchel']
    },
    talia: {
      name: 'Talia', poi: 'arch', dx: -1.4, dz: -1.2, leash: 2.4, firesit: false, seatA: 0,
      palette: { skin: 0xd8ac86, cloth: 0x7a4340, trim: 0xb06a4a, hair: 0x3a2a22 },
      accessory: ['hood', 'satchel']
    }
  };

  var ORDER = ['maren', 'odda', 'gethin', 'corin', 'talia'];

  var api = {
    list: ORDER.slice(),
    INTERACT_RADIUS: 4.0,
    _npcs: Object.create(null)
  };
  EF.npcs = api;

  /* ------------------------------------------------------- ground helper */
  function groundAt(x, z) {
    if (EF.world && typeof EF.world.terrainH === 'function') return EF.world.terrainH(x, z);
    return EF.engine.groundAt(x, z);
  }
  function poiById(id) {
    var pois = (EF.world && EF.world.pois) || [];
    for (var i = 0; i < pois.length; i++) if (pois[i].id === id) return pois[i];
    return null;
  }

  /* ===================================================================== *
   * HUMANOID FACTORY - one shared builder, palette + accessory variation.
   * Stands on y=0, faces +Z (same convention as enemyTypes). Returns
   * { group, parts:{legL, legR, armL, armR, torso, head} }.
   * ===================================================================== */
  var GEO = {
    torso: new THREE.BoxGeometry(0.52, 0.72, 0.30),
    head: new THREE.BoxGeometry(0.34, 0.34, 0.32),
    limb: new THREE.BoxGeometry(0.16, 0.62, 0.16),
    leg: new THREE.BoxGeometry(0.18, 0.66, 0.18),
    cap: new THREE.BoxGeometry(0.38, 0.16, 0.36),
    apron: new THREE.BoxGeometry(0.46, 0.5, 0.08),
    satchel: new THREE.BoxGeometry(0.26, 0.30, 0.14),
    shawl: new THREE.BoxGeometry(0.62, 0.24, 0.40),
    hood: new THREE.BoxGeometry(0.42, 0.40, 0.42),
    stick: new THREE.CylinderGeometry(0.035, 0.045, 1.5, 6),
    staff: new THREE.CylinderGeometry(0.04, 0.04, 1.9, 6),
    strap: new THREE.BoxGeometry(0.05, 0.5, 0.05)
  };
  var ACC_COL = { satchel: 0x5a4632, strap: 0x3f3223, apronTrim: 0xece3d0, wood: 0x6b4a2b, steel: 0xb8c2cc };

  function lam(hex) { return new THREE.MeshLambertMaterial({ color: hex }); }
  function mesh(geo, mat, x, y, z) {
    var m = new THREE.Mesh(geo, mat);
    m.position.set(x || 0, y || 0, z || 0);
    return m;
  }
  function pivot(x, y, z) { var g = new THREE.Group(); g.position.set(x || 0, y || 0, z || 0); return g; }

  function buildHumanoid(pal, accessories) {
    var g = new THREE.Group();
    var mCloth = lam(pal.cloth), mSkin = lam(pal.skin), mTrim = lam(pal.trim), mHair = lam(pal.hair);

    // torso + belt trim
    g.add(mesh(GEO.torso, mCloth, 0, 1.16, 0));
    g.add(mesh(new THREE.BoxGeometry(0.54, 0.10, 0.32), mTrim, 0, 0.86, 0)); // belt

    // head + hair cap + face dab
    var head = mesh(GEO.head, mSkin, 0, 1.66, 0);
    g.add(head);
    g.add(mesh(GEO.cap, mHair, 0, 1.80, 0));                 // hair
    g.add(mesh(new THREE.BoxGeometry(0.30, 0.10, 0.04), 0 ? mSkin : lam(0x2a2018), 0, 1.62, 0.16)); // brow shadow

    // arms (shoulders ~1.5), hang -Y so a pivot at the shoulder swings them
    var armL = pivot(-0.34, 1.50, 0), armR = pivot(0.34, 1.50, 0);
    armL.add(mesh(GEO.limb, mCloth, 0, -0.31, 0));
    armR.add(mesh(GEO.limb, mCloth, 0, -0.31, 0));
    // hands
    armL.add(mesh(new THREE.BoxGeometry(0.17, 0.14, 0.17), mSkin, 0, -0.62, 0));
    armR.add(mesh(new THREE.BoxGeometry(0.17, 0.14, 0.17), mSkin, 0, -0.62, 0));
    g.add(armL); g.add(armR);

    // legs (hips ~0.82), pivots for the walk/idle sway
    var legL = pivot(-0.14, 0.82, 0), legR = pivot(0.14, 0.82, 0);
    legL.add(mesh(GEO.leg, mTrim, 0, -0.33, 0));
    legR.add(mesh(GEO.leg, mTrim, 0, -0.33, 0));
    g.add(legL); g.add(legR);

    // ---- accessories -----------------------------------------------------
    var acc = accessories || [];
    for (var i = 0; i < acc.length; i++) {
      switch (acc[i]) {
        case 'apron':
          g.add(mesh(GEO.apron, mTrim, 0, 1.02, 0.17));
          break;
        case 'shawl':
          g.add(mesh(GEO.shawl, mTrim, 0, 1.44, 0));
          break;
        case 'hood':
          g.add(mesh(GEO.hood, mCloth, 0, 1.72, -0.02));
          break;
        case 'satchel':
          g.add(mesh(GEO.satchel, lam(ACC_COL.satchel), 0.30, 1.06, -0.02));
          g.add(mesh(GEO.strap, lam(ACC_COL.strap), 0.02, 1.36, 0.10)); // diagonal-ish strap
          break;
        case 'stick':
          var st = mesh(GEO.stick, lam(ACC_COL.wood), 0, -0.14, 0);
          armR.add(st); // held in right hand
          break;
        case 'staff':
          var sf = mesh(GEO.staff, lam(ACC_COL.wood), 0, -0.28, 0);
          armR.add(sf);
          armR.add(mesh(new THREE.BoxGeometry(0.10, 0.14, 0.10), lam(ACC_COL.steel), 0, -1.22, 0)); // spearhead
          break;
      }
    }

    return { group: g, parts: { legL: legL, legR: legR, armL: armL, armR: armR, torso: g.children[0], head: head } };
  }

  /* ===================================================================== *
   * REGISTRY + PLACEMENT
   * ===================================================================== */
  var TMP_TARGET = { x: 0, z: 0 };

  function placeNpc(id) {
    var d = DEFS[id];
    var poi = poiById(d.poi);
    if (!poi) { console.warn('[EF.npcs] no poi "' + d.poi + '" for ' + id); return null; }
    var hx = poi.x + d.dx, hz = poi.z + d.dz;

    var built = buildHumanoid(d.palette, d.accessory);
    var grp = built.group;
    grp.position.set(hx, groundAt(hx, hz), hz);
    grp.rotation.y = Math.atan2(poi.x - hx, poi.z - hz); // face the POI centre to start

    EF.engine.scene.add(grp);

    // fire seat (village folk) - ring around the flame at the village centre
    var vpoi = poiById('village');
    var seat = null;
    if (d.firesit && vpoi) {
      seat = { x: vpoi.x + Math.cos(d.seatA) * 2.3, z: vpoi.z + Math.sin(d.seatA) * 2.3, a: d.seatA };
    }

    return {
      id: id, name: d.name, def: d, group: grp, parts: built.parts,
      home: { x: hx, z: hz }, seat: seat, leash: d.leash,
      wander: { x: hx, z: hz }, waitT: 1 + Math.random() * 2,
      moving: false, sitting: false, swayPhase: Math.random() * 6.28,
      legAmt: 0, yaw: grp.rotation.y, talking: false
    };
  }

  /* ===================================================================== *
   * IDLE AI (per game:tick)
   * ===================================================================== */
  var MOVE_SPEED = 0.8;      // m/s stroll
  var NOTICE = 5.5;          // face-player radius
  var _v = { x: 0, z: 0 };

  function faceToward(n, tx, tz) {
    var dx = tx - n.group.position.x, dz = tz - n.group.position.z;
    if (dx * dx + dz * dz < 1e-4) return;
    var want = Math.atan2(dx, dz);
    // shortest-arc ease
    var diff = want - n.yaw;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    n.yaw += diff * 0.18;
    n.group.rotation.y = n.yaw;
  }

  function stepToward(n, tx, tz, dt) {
    var dx = tx - n.group.position.x, dz = tz - n.group.position.z;
    var d = Math.sqrt(dx * dx + dz * dz);
    if (d < 0.15) { n.moving = false; return true; }
    var s = MOVE_SPEED * dt;
    if (s > d) s = d;
    var nx = n.group.position.x + (dx / d) * s;
    var nz = n.group.position.z + (dz / d) * s;
    n.group.position.set(nx, groundAt(nx, nz), nz);
    faceToward(n, tx, tz);
    n.moving = true;
    return false;
  }

  function updateNpc(n, dt, elapsed) {
    var pos = EF.player && EF.player.position;
    var phase = EF.world && EF.world.getTimePhase ? EF.world.getTimePhase() : 'day';
    var night = (phase === 'night');

    var pdist2 = Infinity;
    if (pos) { var ax = pos.x - n.group.position.x, az = pos.z - n.group.position.z; pdist2 = ax * ax + az * az; }

    if (n.talking && pos) {
      // frozen mid-conversation: face the player, no wander
      faceToward(n, pos.x, pos.z);
      n.moving = false;
      animateLimbs(n, dt, elapsed, false);
      return;
    }

    if (night && n.seat) {
      // head to the fire and sit
      var atSeat = stepToward(n, n.seat.x, n.seat.z, dt);
      if (atSeat) {
        if (!n.sitting) { n.sitting = true; sitPose(n, true); }
        // face roughly inward toward the flame
        faceToward(n, poiById('village').x, poiById('village').z);
      }
      animateLimbs(n, dt, elapsed, n.moving);
      return;
    }

    // daytime (or seat-less NPC at night): stand up if we were sitting
    if (n.sitting && !night) { n.sitting = false; sitPose(n, false); }

    if (pos && pdist2 < NOTICE * NOTICE) {
      // notice the player: turn to them, pause the stroll
      faceToward(n, pos.x, pos.z);
      n.moving = false;
      animateLimbs(n, dt, elapsed, false);
      return;
    }

    // wander within the leash of home
    n.waitT -= dt;
    var tx = n.wander.x, tz = n.wander.z;
    var done = stepToward(n, tx, tz, dt);
    if (done) {
      if (n.waitT <= 0) {
        var a = Math.random() * Math.PI * 2;
        var r = Math.random() * n.leash;
        n.wander.x = n.home.x + Math.cos(a) * r;
        n.wander.z = n.home.z + Math.sin(a) * r;
        n.waitT = 1.5 + Math.random() * 3.5;
      }
    }
    animateLimbs(n, dt, elapsed, n.moving);
  }

  function animateLimbs(n, dt, elapsed, moving) {
    // ease leg-swing amplitude toward moving state
    var target = moving ? 1 : 0;
    n.legAmt += (target - n.legAmt) * Math.min(1, dt * 8);
    if (n.sitting) return; // sit pose owns the legs
    n.swayPhase += dt * (moving ? 8 : 2.2);
    var s = Math.sin(n.swayPhase) * (0.5 * n.legAmt + 0.03);
    n.parts.legL.rotation.x = s;
    n.parts.legR.rotation.x = -s;
    n.parts.armL.rotation.x = -s * 0.7;
    n.parts.armR.rotation.x = s * 0.7;
    // gentle breathing bob
    n.parts.torso.position.y = 1.16 + Math.sin(elapsed * 1.6 + n.swayPhase * 0.1) * 0.012;
  }

  function sitPose(n, on) {
    if (on) {
      n.parts.legL.rotation.x = 1.25; n.parts.legR.rotation.x = 1.25;
      n.parts.armL.rotation.x = 0.4; n.parts.armR.rotation.x = 0.4;
      n.group.position.y = groundAt(n.group.position.x, n.group.position.z) - 0.32;
    } else {
      n.parts.legL.rotation.x = 0; n.parts.legR.rotation.x = 0;
      n.parts.armL.rotation.x = 0; n.parts.armR.rotation.x = 0;
      n.group.position.y = groundAt(n.group.position.x, n.group.position.z);
    }
  }

  /* ===================================================================== *
   * DIALOGUE RUNNER
   * ===================================================================== */
  var _open = null; // { npcId, nodeId, choices:[choiceObj] }

  function entryNode(npcId) {
    var tree = EF.dialogue.npc[npcId];
    if (!tree) return null;
    var br = tree.branches || [];
    for (var i = 0; i < br.length; i++) {
      if (EF.quests.getState(br[i].quest) === br[i].state) return br[i].node;
    }
    return tree.fallback;
  }

  function openNode(npcId, nodeId) {
    var tree = EF.dialogue.npc[npcId];
    var node = tree && tree.nodes[nodeId];
    if (!node) { console.warn('[EF.npcs] missing dialogue node ' + npcId + '/' + nodeId); return; }

    // announce an offer so UI/analytics can react
    for (var c = 0; c < node.choices.length; c++) {
      if (node.choices[c].action === 'accept' && node.choices[c].quest) {
        bus.emit('quest:offered', { id: node.choices[c].quest });
        break;
      }
    }

    _open = { npcId: npcId, nodeId: nodeId, choices: node.choices };
    var out = [];
    for (var i = 0; i < node.choices.length; i++) out.push({ id: i, label: node.choices[i].label });
    bus.emit('dialogue:open', { npc: npcId, speaker: tree.name, text: node.text, choices: out });
  }

  function closeDialogue() {
    var was = _open ? _open.npcId : null;
    _open = null;
    var n = was && api._npcs[was];
    if (n) n.talking = false;
    bus.emit('dialogue:close', { npc: was });
  }

  api.openWith = function (npcId) {
    var n = api._npcs[npcId];
    if (n) n.talking = true;
    openNode(npcId, entryNode(npcId));
  };

  api.nearest = function () {
    var pos = EF.player && EF.player.position;
    if (!pos) return null;
    var best = null, bestD = Infinity;
    for (var id in api._npcs) {
      var g = api._npcs[id].group.position;
      var dx = pos.x - g.x, dz = pos.z - g.z, d = dx * dx + dz * dz;
      if (d < bestD) { bestD = d; best = id; }
    }
    return best ? { id: best, dist: Math.sqrt(bestD) } : null;
  };

  api.interact = function () {
    var near = api.nearest();
    if (!near || near.dist > api.INTERACT_RADIUS) return false;
    api.openWith(near.id);
    return true;
  };

  api.choose = function (choiceId) {
    if (!_open) return;
    var choice = _open.choices[choiceId];
    if (!choice) return;
    var npcId = _open.npcId;

    switch (choice.action) {
      case 'accept':
        EF.quests.accept(choice.quest);
        closeDialogue();
        break;
      case 'turnIn':
        EF.quests.turnIn(choice.quest, npcId);
        closeDialogue();
        break;
      case 'goto':
        openNode(npcId, choice.node); // gossip / branch walk, stays open
        break;
      case 'close':
      default:
        closeDialogue();
        break;
    }
  };

  // UI dept emits dialogue:choice; we also expose EF.npcs.choose directly.
  bus.on('dialogue:choice', function (p) {
    if (!p || p.__selfTest) return;
    api.choose(p.choiceId != null ? p.choiceId : p.id);
  });

  api.get = function (id) { return api._npcs[id] || null; };

  /* ===================================================================== *
   * BOOT + TICK
   * ===================================================================== */
  bus.on('game:booted', function (p) {
    if (p && p.__selfTest) return;
    if (!EF.world || !EF.world.pois || !EF.world.pois.length) {
      console.warn('[EF.npcs] world POIs not present at boot; NPCs not placed');
      return;
    }
    for (var i = 0; i < ORDER.length; i++) {
      var n = placeNpc(ORDER[i]);
      if (n) api._npcs[ORDER[i]] = n;
    }
    // desktop convenience: E opens the nearest NPC. UI should instead call
    // EF.npcs.interact() from its own interact button (or bindButton).
    try { EF.engine.input.bindKey('KeyE', 'interact'); } catch (e) { /* optional */ }
    console.log('[EF.npcs] placed ' + Object.keys(api._npcs).length + ' NPCs');
  });

  bus.on('game:tick', function (t) {
    if (!t || t.__selfTest) return;
    if (EF.engine.input && EF.engine.input.buttons &&
        EF.engine.input.buttons.wasPressed('interact')) {
      api.interact();
    }
    for (var id in api._npcs) updateNpc(api._npcs[id], t.dt, t.elapsed);
  });

  console.log('[EF.npcs] ready');
})();
</script>
<!-- ================= state-adapter.js       build-05  (Integrator glue -- EF.state bridge) ================= -->
<script>
/* ============================================================================
 * EMBERFELL -- integration/state-adapter.js  (Integrator glue, build-05)
 * WHY THIS EXISTS: UI dept's ui.js/map.js READ an authoritative EF.state view
 * ({player, inventory, quests, tracked, interact}) that NO department
 * publishes, and ASK for changes via events (player:respawn, ui:track,
 * item:use) that NO department consumes. Without this adapter the HUD runs on
 * fallback dummy data, the map arrow never moves, and the death screen's
 * "Rise Again" button does nothing. This module bridges the two shipped
 * contracts using only public surfaces:
 *
 *   EF.state.player     <- EF.player.stats + EF.player.position (mirrored)
 *   EF.state.quests     <- EF.quests getState/progress/objectiveText,
 *                          rebuilt at EVENT rate (quest:*), not per frame
 *   EF.state.tracked    <- EF.quests.tracked
 *   EF.state.interact   <- EF.npcs.nearest() vs INTERACT_RADIUS (4 Hz)
 *   EF.state.inventory  <- ledger fed by loot:collected / item:use
 *   player:respawn      -> EF.combat.respawn()
 *   ui:track {id}       -> EF.quests.track(id)
 *   item:use {id|item}  -> potion: EF.combat.heal(POTION_HEAL) + decrement.
 *                          (heal() is combat.js's documented "UI/inventory
 *                          hook". POTION_HEAL=30 is a PLACEHOLDER constant --
 *                          Combat to ratify an item table in Cycle 4.)
 *
 * s7 discipline: per-tick work mutates the same objects (no allocation);
 * arrays are rebuilt only on quest/loot events. No rAF; rides game:tick.
 * OWNERSHIP: EF.state should belong to a gameplay dept (Player) -- this
 * module is TEMPORARY glue pending contract ratification (see CHANGELOG
 * AR-4/AR-5). Delete/replace when ownership lands.
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.bus || !EF.engine) { console.error('[EF.stateAdapter] engine.js must load first'); return; }
  var bus = EF.bus;

  var POTION_HEAL = 30; // placeholder -- Combat owns the real number (CR-7/AR-5)

  var state = {
    player: { hp: 100, maxhp: 100, st: 100, maxst: 100, xp: 0, xpNext: 100,
              lvl: 1, gold: 0, weapon: '-', x: 0, z: 8, yaw: 0 },
    inventory: [],
    equipped: null,
    quests: [],
    tracked: null,
    interact: { available: false, label: 'Talk' }
  };
  EF.state = state;

  /* ---------------- inventory ledger (event-fed) ------------------------- */
  var ITEM_NAMES = { potion: 'Healing Potion', herb: 'Glowing Herb',
                     pelt: 'Wolf Pelt', ember: 'Ember Shard' };
  function invFind(id) {
    for (var i = 0; i < state.inventory.length; i++) if (state.inventory[i].id === id) return state.inventory[i];
    return null;
  }
  function invAdd(id, n) {
    var it = invFind(id);
    if (it) { it.count += n; return; }
    state.inventory.push({
      id: id, name: ITEM_NAMES[id] || id,
      kind: id === 'potion' ? 'consumable' : 'material',
      count: n
    });
  }
  bus.on('loot:collected', function (p) {
    if (!p || p.__selfTest) return;
    if (p.item && p.item !== 'gold') invAdd(p.item, p.count || 1);
  });
  bus.on('item:use', function (p) {
    if (!p || p.__selfTest) return;
    var id = p.id || p.item;
    var it = id && invFind(id);
    if (!it || it.count < 1) return;
    if (id === 'potion') {
      if (EF.combat && EF.combat.isPlayerDead && EF.combat.isPlayerDead()) return;
      it.count--;
      if (EF.combat && EF.combat.heal) EF.combat.heal(POTION_HEAL);
      bus.emit('ui:toast', { text: '+' + POTION_HEAL + ' hp' });
      if (it.count <= 0) state.inventory.splice(state.inventory.indexOf(it), 1);
    }
    // other consumables: no gameplay owner yet -- ignored, counts preserved
  });

  /* ---------------- quest journal view (event-rate rebuild) -------------- */
  function questLine(id) {
    var lines = EF.quests.objectiveText(id);
    return lines.length ? lines.join(' | ') : (EF.questData.quests[id].blurb || '');
  }
  function rebuildQuests() {
    if (!EF.quests || !EF.questData) return;
    var out = [];
    var order = EF.questData.order;
    for (var i = 0; i < order.length; i++) {
      var id = order[i], st = EF.quests.getState(id);
      if (st === 'locked') continue;
      var q = EF.questData.quests[id];
      out.push({
        id: id, name: q.title,
        state: st === 'done' ? 'done' : (st === 'offerable' ? 'offered' : 'active'),
        progress: EF.quests.progress(id),
        line: st === 'offerable' ? (q.blurb || '') : questLine(id)
      });
    }
    state.quests = out;
  }
  ['quest:offered', 'quest:started', 'quest:updated', 'quest:completed'].forEach(function (ev) {
    bus.on(ev, function (p) { if (!p || !p.__selfTest) rebuildQuests(); });
  });

  /* ---------------- ASK-side glue ---------------------------------------- */
  bus.on('player:respawn', function (p) {
    if (p && p.__selfTest) return;
    if (EF.combat && EF.combat.respawn) EF.combat.respawn();
  });
  bus.on('ui:track', function (p) {
    if (!p || p.__selfTest || !p.id) return;
    if (EF.quests && EF.quests.track) EF.quests.track(p.id);
    rebuildQuests();
  });

  /* ---------------- per-tick mirror (mutate-in-place, no alloc) ----------- */
  var acc = 0;
  bus.on('game:tick', function (t) {
    if (t && t.__selfTest) return;
    var P = state.player;
    if (EF.player) {
      var s = EF.player.stats, pos = EF.player.position;
      P.hp = s.hp; P.maxhp = s.maxhp; P.st = s.st; P.maxst = s.maxst;
      P.xp = s.xp; P.xpNext = s.xpNext; P.lvl = s.lvl; P.gold = s.gold;
      P.x = pos.x; P.z = pos.z; P.yaw = pos.yaw;
      var w = EF.player.getWeapon();
      P.weapon = w ? w.name : '-';
      state.equipped = EF.player.getWeaponId();
    }
    if (EF.quests) state.tracked = EF.quests.tracked;

    acc += t.dt;                              // interact probe at 4 Hz
    if (acc < 0.25) return;
    acc = 0;
    if (EF.npcs && EF.npcs.nearest) {
      var near = EF.npcs.nearest();
      state.interact.available = !!(near && near.dist <= EF.npcs.INTERACT_RADIUS);
    }
  });

  bus.on('game:booted', function (p) {
    if (p && p.__selfTest) return;
    rebuildQuests();
  });

  console.log('[EF.stateAdapter] EF.state bridge active (TEMPORARY integrator glue)');
})();
</script>
<!-- ================= ui.js                  Cycle 3  (UI/UX) + integrator dialogue-payload patch ================= -->
<script>
/* ============================================================================
 * EMBERFELL — ui.js   (UI/UX department — Cycle 3)
 * Owns: HUD, touch-control DOM + registration, panels (inventory / quest log /
 * pause), feedback (damage flash, floating popups, level-up + quest banners,
 * toasts), dialogue box, and the death/respawn + title screens.
 * Map + minimap live in map.js (EF.ui.map).
 *
 * Contract compliance (v1.1):
 *  §2.2  No static <style>. All CSS is JS-injected (a runtime-built <style>
 *        for rules/keyframes/:active + el.style.cssText for layout). If the
 *        sandbox strips the injected <style> too, the cssText layout still
 *        holds; verify banners/:active on-device.
 *  §2.1  Only console.log/warn/error used here (info/table not assumed).
 *  §4    Emits by canonical name where one exists. UI→others requests use
 *        pre-approved names (item:use, weapon:equip, dialogue:choice,
 *        map:setMarker) + candidates flagged below; the v1.0 bus warns once.
 *  §5    Buttons are registered via EF.engine.input.bindButton — the ENGINE
 *        attaches the listeners. UI reacts to the resulting input:button
 *        events; it does NOT add its own listeners to registered buttons.
 *        (Transient panel/dialogue buttons are UI-internal and DO get their
 *        own touchstart+preventDefault handlers — the v0 iOS double-fire fix.)
 *
 * ---------------------------------------------------------------------------
 * DATA FLOW  (the boundary that keeps "zero direct writes to EF.state" true)
 *   READ  EF.state (authoritative, read-only) for HUD numbers, inventory,
 *         quests, and the contextual-interact prompt. Throttled.
 *   HEAR  bus events for feedback moments (flash / popup / banner / sfx).
 *   ASK   emit events to request changes; UI never mutates gameplay fields.
 *   OWN   EF.ui.mode ('play'|'menu'|'dialogue'). Player/Combat gate movement
 *         and attacks on EF.ui.mode === 'play'. UI mirrors it on ui:menu.
 *
 * EF.state shape UI expects (all optional; UI degrades if absent):
 *   EF.state.player   { hp,maxhp, st,maxst, xp,xpNext, lvl, gold, weapon }
 *   EF.state.inventory[] { id, name, kind:'weapon'|'consumable'|'material',
 *                          count, dmg? }            // weapon carries dmg
 *   EF.state.equipped   weaponId (string)
 *   EF.state.quests[]   { id, name, state:'offered'|'active'|'done',
 *                         progress:0..1, line, marker?:{x,z} }
 *   EF.state.tracked    questId (string)            // UI may set via ui:track
 *   EF.state.interact   { available:bool, label:'Talk'|'Pick up'|'Read'|... }
 *
 * Public: EF.ui.toast(text) · EF.ui.mode · EF.ui.setMode(m) · EF.ui.openBag()
 *         EF.ui.openQuests() · EF.ui.openMenu() · EF.ui.closeAll()
 *         EF.ui.banner(text,kind) · EF.ui.selfTest()
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.bus) { console.error('[EF.ui] EF.bus missing — load engine.js first'); return; }
  var bus = EF.bus, eng = EF.engine || null;

  /* ---- design tokens: aged parchment & iron ----------------------------- */
  var T = {
    ink:'#f3e9c8', gold:'#ffd97a', brass:'#c9a84f', brassDk:'#8a6d2a',
    iron:'rgba(21,16,11,.92)', ironSolid:'#15100b', iron2:'#241a10',
    hp:'#e8574a', hpDk:'#a92a20', st:'#4ac06a', stDk:'#207a3a',
    xp:'#58a6e8', xpDk:'#2b5f9e', bad:'#e8574a', good:'#7eff9a',
    serif:"Georgia,'Iowan Old Style','Times New Roman',serif"
  };

  /* ---- tiny DOM helpers ------------------------------------------------- */
  function el(tag, css, txt) {
    var e = document.createElement(tag);
    if (css) e.style.cssText = css;
    if (txt != null) e.textContent = txt;
    return e;
  }
  function tap(e, fn) { // transient UI buttons: iOS-safe, no double-fire
    e.addEventListener('touchstart', function (ev) { ev.preventDefault(); ev.stopPropagation(); fn(ev); }, { passive:false });
    e.addEventListener('click', function (ev) { ev.preventDefault(); fn(ev); });
    e.style.touchAction = 'none';
  }
  function sfx(name){ try { bus.emit('audio:play', { sfx:name }); } catch(_){} }

  /* ---- read-only state access ------------------------------------------ */
  var FALLBACK = { player:{ hp:100,maxhp:100, st:100,maxst:100, xp:0,xpNext:100, lvl:1, gold:0, weapon:'Iron Sword' },
                   inventory:[], equipped:null, quests:[], tracked:null, interact:{available:false,label:'Interact'} };
  function S(){ return EF.state || FALLBACK; }
  function P(){ return (EF.state && EF.state.player) || FALLBACK.player; }

  /* ---- register a couple of UI sfx (Audio dept may override) ------------ */
  if (eng && eng.audio && eng.audio.register) {
    var reg = eng.audio.register;
    reg('ui.open',   { type:'square',   freq:520, freqEnd:660, duration:0.06, gain:0.12 });
    reg('ui.close',  { type:'square',   freq:440, freqEnd:330, duration:0.06, gain:0.10 });
    reg('ui.levelup',{ type:'triangle', freq:523, freqEnd:1046,duration:0.30, gain:0.16 });
    reg('ui.quest',  { type:'triangle', freq:659, freqEnd:988, duration:0.28, gain:0.15 });
    reg('ui.coin',   { type:'square',   freq:880, freqEnd:1320,duration:0.10, gain:0.12 });
    reg('ui.death',  { type:'sawtooth', freq:220, freqEnd:60,  duration:0.80, gain:0.18 });
  }

  /* =======================================================================
   * 1. STYLE INJECTION  (rules that inline styles can't express)
   * ===================================================================== */
  (function injectStyle(){
    var css = [
      '@keyframes efRise{0%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-64px) scale(1.05)}}',
      '@keyframes efBanner{0%{opacity:0;transform:translate(-50%,10px)}12%{opacity:1;transform:translate(-50%,0)}80%{opacity:1}100%{opacity:0;transform:translate(-50%,-8px)}}',
      '@keyframes efFlash{0%{opacity:.42}100%{opacity:0}}',
      '.ef-btn:active{background:rgba(243,233,200,.34)!important;transform:translateY(1px)}',
      '.ef-chip:active{filter:brightness(.86)}',
      '.ef-row:last-child{border-bottom:none!important}',
      '.ef-scroll::-webkit-scrollbar{width:0;height:0}'
    ].join('');
    try {
      var s = document.createElement('style'); s.setAttribute('data-ef','ui'); s.textContent = css;
      (document.head || document.documentElement).appendChild(s);
    } catch(e){ console.warn('[EF.ui] style injection failed', e); }
  })();

  var SA = 'env(safe-area-inset-'; // shorthand for safe-area insets

  /* =======================================================================
   * 2. ROOT + HUD
   * ===================================================================== */
  var root = el('div','position:fixed;inset:0;z-index:10;pointer-events:none;font-family:'+T.serif+';');
  document.body.appendChild(root);

  function bar(w,h,fillA,fillB){
    var b = el('div','width:'+w+'px;height:'+h+'px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.32);border-radius:'+(h/2)+'px;margin-bottom:5px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.6);');
    var f = el('div','height:100%;width:100%;border-radius:'+(h/2)+'px;transition:width .14s ease-out;background:linear-gradient('+fillA+','+fillB+');');
    b.appendChild(f); return { box:b, fill:f };
  }
  var hud = el('div','position:fixed;top:calc(10px + '+SA+'top));left:12px;pointer-events:none;text-shadow:0 1px 3px #000;');
  var hpB = bar(154,14,T.hp,T.hpDk), stB = bar(124,10,T.st,T.stDk), xpB = bar(124,7,T.xp,T.xpDk);
  var statLine = el('div','color:'+T.ink+';font-size:13px;margin-top:2px;line-height:1.5;');
  statLine.innerHTML = 'Lv <b id="ef-lv">1</b> &nbsp;·&nbsp; <span style="color:'+T.gold+'">◆</span> <b id="ef-gold">0</b>';
  var wpnChip = el('div','display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:3px 9px;border:1px solid '+T.brassDk+';border-radius:5px;background:linear-gradient(#2a2114,#1a1408);color:'+T.ink+';font-size:12px;');
  wpnChip.innerHTML = '<span style="color:'+T.brass+'">⚔</span><span id="ef-wpn">—</span>';
  var questLine = el('div','color:'+T.gold+';font-size:13px;margin-top:6px;max-width:210px;line-height:1.35;display:none;');
  hud.append(hpB.box, stB.box, xpB.box, statLine, wpnChip, questLine);
  root.appendChild(hud);

  /* =======================================================================
   * 3. TOUCH CONTROLS  — build DOM, register with engine's button registry
   *    (attack/jump/interact are gameplay-owned; UI only builds+binds them
   *     and drives the interact label. bag/map/menu are UI-owned.)
   * ===================================================================== */
  function ctlBtn(label, css){
    var b = el('div','position:fixed;pointer-events:auto;display:flex;align-items:center;justify-content:center;text-align:center;'
      + 'color:'+T.ink+';font-family:'+T.serif+';border-radius:50%;line-height:1.05;'
      + 'background:linear-gradient(rgba(36,26,16,.62),rgba(20,16,10,.62));'
      + 'border:2px solid rgba(243,233,200,.5);box-shadow:0 2px 6px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);'
      + 'touch-action:none;-webkit-user-select:none;user-select:none;' + (css||''));
    b.className = 'ef-btn'; b.textContent = label; return b;
  }
  var bAttack  = ctlBtn('Attack','right:18px;bottom:calc(102px + '+SA+'bottom));width:82px;height:82px;font-size:15px;');
  var bJump    = ctlBtn('Jump',  'right:112px;bottom:calc(30px + '+SA+'bottom));width:66px;height:66px;font-size:13px;');
  var bInteract= ctlBtn('Talk',  'right:18px;bottom:calc(200px + '+SA+'bottom));width:72px;height:72px;font-size:13px;display:none;');
  // top-right stack: Map, Bag, Menu  (rectangular, ≥60px targets)
  function topBtn(label, right){
    var b = el('div','position:fixed;top:calc(10px + '+SA+'top));right:'+right+'px;pointer-events:auto;'
      + 'width:62px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;'
      + 'color:'+T.ink+';font-size:13px;font-family:'+T.serif+';background:linear-gradient(#241a10,#15100b);'
      + 'border:1px solid '+T.brassDk+';box-shadow:0 2px 5px rgba(0,0,0,.4);touch-action:none;');
    b.className='ef-btn'; b.textContent=label; return b;
  }
  var bBag = topBtn('Bag',12), bMap = topBtn('Map',80), bMenu = topBtn('☰',148);
  root.append(bAttack,bJump,bInteract,bBag,bMap,bMenu);

  // Register with the engine. The engine attaches listeners + emits input:button.
  function bind(name, dom){ if (eng && eng.input && eng.input.bindButton) eng.input.bindButton(name, dom); }
  bind('attack',bAttack); bind('jump',bJump); bind('interact',bInteract);
  bind('bag',bBag); bind('map',bMap); bind('menu',bMenu);

  // UI reacts to the UI-owned buttons only (gameplay buttons handled elsewhere).
  bus.on('input:button', function (p) {
    if (!p || p.__selfTest || !p.pressed) return;
    if (p.name === 'bag')  toggleBag();
    else if (p.name === 'map')  EF.ui.map ? EF.ui.map.toggle() : toast('Map module not loaded');
    else if (p.name === 'menu') toggleMenu();
  });

  /* =======================================================================
   * 4. PANELS  (inventory / quest log / pause)  — mode gates movement
   * ===================================================================== */
  function panelShell(titleTxt){
    var wrap = el('div','position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);'
      + 'width:min(90vw,360px);max-height:78vh;display:none;flex-direction:column;pointer-events:auto;z-index:16;'
      + 'background:linear-gradient(#1c1509,#120d06);border:2px solid '+T.brass+';border-radius:12px;'
      + 'box-shadow:0 10px 40px rgba(0,0,0,.6),inset 0 0 0 1px rgba(0,0,0,.5);padding:16px;font-family:'+T.serif+';');
    var h = el('div','color:'+T.gold+';font-size:19px;letter-spacing:1px;margin-bottom:10px;border-bottom:1px solid '+T.brassDk+';padding-bottom:8px;',titleTxt);
    var body = el('div','overflow-y:auto;-webkit-overflow-scrolling:touch;'); body.className='ef-scroll';
    var close = el('div','margin-top:12px;min-height:52px;display:flex;align-items:center;justify-content:center;'
      + 'background:#2a2114;color:'+T.ink+';border:1px solid '+T.brass+';border-radius:8px;font-size:15px;','Close');
    close.className='ef-chip'; tap(close, closeAll);
    wrap.append(h, body, close); root.appendChild(wrap);
    return { wrap:wrap, body:body };
  }
  function row(){ return el('div','display:flex;justify-content:space-between;align-items:center;gap:10px;'
    + 'color:'+T.ink+';font-size:15px;padding:11px 2px;border-bottom:1px solid rgba(201,168,79,.22);'); }
  function actBtn(label, accent){ var b = el('div','min-width:70px;min-height:44px;padding:0 14px;display:flex;align-items:center;'
    + 'justify-content:center;border-radius:7px;font-size:14px;font-family:'+T.serif+';'
    + 'background:'+(accent==='use'?'#274a2b':'#2a2f52')+';color:'+T.ink+';border:1px solid '+(accent==='use'?'#4ac06a':'#5a7fd0')+';',label);
    b.className='ef-chip'; return b; }

  /* ---- inventory -------------------------------------------------------- */
  var invP = panelShell('Inventory');
  function renderInv(){
    var b = invP.body; b.innerHTML=''; var s = S(), inv = s.inventory||[];
    var equipped = (inv.filter(function(i){return i.id===s.equipped;})[0]) || null;
    var gRow = row(); gRow.append(el('span',null,'Gold'), el('b','color:'+T.gold, String(P().gold||0))); b.appendChild(gRow);
    if (!inv.length){ b.appendChild(el('div','padding:18px 2px;color:#b7a982;font-size:14px;','Your pack is empty. Wolves may drop coin and potions.')); return; }
    inv.forEach(function(it){
      var r = row();
      var name = el('span',null, it.name + (it.count>1?(' ×'+it.count):''));
      r.appendChild(name);
      if (it.kind==='weapon'){
        var eq = (it.id===s.equipped);
        var cmp = equipped && !eq ? (it.dmg - (equipped.dmg||0)) : 0;
        var label = el('span','font-size:12px;color:'+(cmp>0?T.good:cmp<0?T.bad:'#b7a982')+';margin-right:6px;',
          'DMG '+it.dmg + (equipped&&!eq ? (cmp>=0?'  (+'+cmp+')':'  ('+cmp+')') : (eq?'  · equipped':'')));
        var wrap2 = el('div','display:flex;align-items:center;gap:8px;'); wrap2.appendChild(label);
        if (!eq){ var e2 = actBtn('Equip'); tap(e2, function(){ bus.emit('weapon:equip',{ id:it.id }); sfx('ui.click'); }); wrap2.appendChild(e2); }
        r.appendChild(wrap2);
      } else if (it.kind==='consumable'){
        var u = actBtn('Use','use'); tap(u, function(){ bus.emit('item:use',{ id:it.id }); sfx('ui.click'); }); r.appendChild(u);
      }
      b.appendChild(r);
    });
  }

  /* ---- quest log -------------------------------------------------------- */
  var qP = panelShell('Quest Log');
  function renderQuests(){
    var b = qP.body; b.innerHTML=''; var s = S(), qs = s.quests||[];
    if (!qs.length){ b.appendChild(el('div','padding:18px 2px;color:#b7a982;font-size:14px;','No quests yet. Seek Maren by the fire.')); return; }
    qs.forEach(function(q){
      var r = el('div','padding:11px 2px;border-bottom:1px solid rgba(201,168,79,.22);'+(q.id===s.tracked?'background:rgba(201,168,79,.08);':''));
      r.className='ef-chip';
      var top = el('div','display:flex;justify-content:space-between;align-items:center;');
      var nm = el('span','font-size:15px;color:'+(q.state==='done'?'#9fd0a0':T.ink)+';', q.name + (q.id===s.tracked?'  ◂ tracked':''));
      var badge = el('span','font-size:11px;color:'+(q.state==='done'?T.good:q.state==='offered'?'#b7a982':T.gold)+';', q.state.toUpperCase());
      top.append(nm,badge); r.appendChild(top);
      if (q.line) r.appendChild(el('div','font-size:12px;color:#c9bd97;margin-top:3px;', q.line));
      if (q.state==='active' && typeof q.progress==='number'){
        var pb = el('div','height:6px;background:rgba(0,0,0,.5);border-radius:3px;margin-top:6px;overflow:hidden;');
        pb.appendChild(el('div','height:100%;width:'+Math.round(q.progress*100)+'%;background:linear-gradient('+T.gold+','+T.brassDk+');'));
        r.appendChild(pb);
      }
      tap(r, function(){ trackQuest(q); });
      b.appendChild(r);
    });
  }
  function trackQuest(q){
    if (q.state==='offered') return;
    bus.emit('ui:track',{ id:q.id });                 // §4 candidate (Quests owns tracked)
    if (q.marker) bus.emit('map:setMarker',{ x:q.marker.x, z:q.marker.z, label:q.name });
    questLine.style.display='block';
    questLine.textContent = 'Quest: ' + (q.line || q.name);
    renderQuests(); sfx('ui.click');
  }

  /* ---- pause / settings ------------------------------------------------- */
  var mP = panelShell('Paused');
  (function buildMenu(){
    var b = mP.body;
    var qRow = row(); qRow.appendChild(el('span',null,'Quality'));
    var qBtn = actBtn('High (1.5×)'); var hi = true;
    tap(qBtn, function(){ hi = !hi; var pr = hi?1.5:1.0; qBtn.textContent = hi?'High (1.5×)':'Low (1.0×)';
      try { if (eng && eng.renderer) { eng.renderer.setPixelRatio(pr); if (eng.renderer.setSize) eng.renderer.setSize(window.innerWidth, window.innerHeight); } } catch(_){}
      sfx('ui.click'); });
    qRow.appendChild(qBtn); b.appendChild(qRow);
    var sRow = row(); sRow.appendChild(el('span',null,'Sound'));
    var sBtn = actBtn('On','use'); var muted = eng && eng.audio ? !!eng.audio.muted : false;
    function paint(){ sBtn.textContent = muted?'Off':'On'; sBtn.style.background = muted?'#4a2727':'#274a2b'; sBtn.style.borderColor = muted?'#d06a6a':'#4ac06a'; }
    paint(); tap(sBtn, function(){ muted=!muted; if (eng&&eng.audio&&eng.audio.setMuted) eng.audio.setMuted(muted); paint(); });
    sRow.appendChild(sBtn); b.appendChild(sRow);
    var rRow = row(); rRow.appendChild(el('span',null,'Resume play')); var rBtn = actBtn('Resume','use'); tap(rBtn, closeAll); rRow.appendChild(rBtn); b.appendChild(rRow);
  })();

  /* ---- panel open/close + mode ----------------------------------------- */
  function setMode(m){ EF.ui.mode = m; try { bus.emit('ui:menu',{ mode:m, open:(m!=='play') }); } catch(_){} }
  function anyOpen(){ return invP.wrap.style.display==='flex' || qP.wrap.style.display==='flex' || mP.wrap.style.display==='flex'; }
  function showPanel(p, render){ closeAll(true); render && render(); p.wrap.style.display='flex'; setMode('menu'); sfx('ui.open'); }
  function toggleBag(){ invP.wrap.style.display==='flex' ? closeAll() : showPanel(invP, renderInv); }
  function toggleQuests(){ qP.wrap.style.display==='flex' ? closeAll() : showPanel(qP, renderQuests); }
  function toggleMenu(){ mP.wrap.style.display==='flex' ? closeAll() : showPanel(mP); }
  function closeAll(silent){
    var was = anyOpen() || dlg.wrap.style.display==='flex';
    invP.wrap.style.display=qP.wrap.style.display=mP.wrap.style.display='none';
    dlg.wrap.style.display='none';
    if (deathScreen.style.display==='flex' || titleScreen.style.display==='flex') return; // those own the mode
    setMode('play'); if (was && !silent) sfx('ui.close');
  }

  /* =======================================================================
   * 5. DIALOGUE  (event-driven; choices emit dialogue:choice)
   * ===================================================================== */
  var dlg = (function(){
    var wrap = el('div','position:fixed;left:50%;bottom:calc(22px + '+SA+'bottom));transform:translateX(-50%);'
      + 'width:min(93vw,440px);display:none;pointer-events:auto;z-index:16;font-family:'+T.serif+';'
      + 'background:linear-gradient(#1a1409,#100c05);border:2px solid '+T.brass+';border-radius:12px;padding:15px 16px;box-shadow:0 8px 30px rgba(0,0,0,.6);');
    var name = el('div','color:'+T.gold+';font-size:15px;margin-bottom:6px;');
    var text = el('div','color:'+T.ink+';font-size:16px;line-height:1.5;margin-bottom:12px;');
    var btns = el('div','display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-end;');
    wrap.append(name,text,btns); root.appendChild(wrap);
    return { wrap:wrap, name:name, text:text, btns:btns };
  })();
  function openDialogue(p){
    /* [build-05 integrator patch] npcs.js emits `speaker`; accept both */
    dlg.name.textContent = p.name||p.speaker||''; dlg.text.textContent = p.text||'';
    dlg.btns.innerHTML='';
    (p.choices||[{label:'Close',id:'close'}]).forEach(function(c){
      var b = el('div','min-height:52px;padding:0 18px;display:flex;align-items:center;justify-content:center;'
        + 'background:#3a2f18;color:'+T.ink+';border:1px solid '+T.brass+';border-radius:8px;font-size:15px;font-family:'+T.serif+';', c.label);
      b.className='ef-chip';
      tap(b, function(){ bus.emit('dialogue:choice',{ id:c.id }); if (c.id==='close') closeDialogue(); }); // iOS-safe
      dlg.btns.appendChild(b);
    });
    invP.wrap.style.display=qP.wrap.style.display=mP.wrap.style.display='none';
    dlg.wrap.style.display='flex'; setMode('dialogue'); sfx('ui.open');
  }
  function closeDialogue(){ dlg.wrap.style.display='none'; if (!anyOpen()) setMode('play'); }

  /* =======================================================================
   * 6. FEEDBACK  — flash, floating popups, banners, toasts
   * ===================================================================== */
  var flash = el('div','position:fixed;inset:0;background:#c81a12;opacity:0;pointer-events:none;z-index:12;');
  root.appendChild(flash);
  function doFlash(amt){ flash.style.animation='none'; void flash.offsetWidth;
    flash.style.setProperty('--a', amt); flash.style.animation='efFlash .45s ease-out';
  }
  function popup(text, color){
    var p = el('div','position:fixed;left:'+(50 + (Math.random()*10-5))+'%;top:38%;transform:translate(-50%,0);'
      + 'z-index:14;pointer-events:none;font-family:'+T.serif+';font-weight:bold;font-size:19px;'
      + 'color:'+(color||'#dfe7ff')+';text-shadow:0 1px 4px #000;animation:efRise 1.2s ease-out forwards;', text);
