<script>
/* ============================================================================
 * EMBERFELL — enemies.js  (Combat dept, Cycle 2)
 * Pooled enemies from data/enemyTypes.js. States: idle/wander/chase/attack/
 * dead. One AI wrinkle per type (wolves circle, skeletons slow+tanky, bandits
 * kite then lunge, troll rare high-HP wanderer). Attacks telegraph with a
 * wind-up pose. Health bars billboard via the parent-inverse quaternion trick.
 * Spawn zones by biome; respawn away from the player.
 *
 * Ownership boundary (Contract v1.1 §5 + Cycle 2 pitfall):
 *   - enemies.js owns kinematics, AI, models, hp-bar rendering, spawn/respawn,
 *     and lifecycle events (enemy:spawned / enemy:died).
 *   - combat.js owns ALL hp mutation. Enemies never write e.hp; combat does.
 *     During an attack strike the enemy calls EF.combat.hurtPlayer(...) rather
 *     than touching player hp.
 *
 * No per-frame allocation in the AI loop: classic for-loops, module-scope
 * scratch objects, number math only.
 *
 * Load order: after engine.js and data/enemyTypes.js. Depends on THREE (r128),
 * EF.engine (bus/camera/time), EF.data.enemyTypes, EF.player (position),
 * EF.combat (hurtPlayer). Reads EF.world.terrainH if present, else flat.
 * Delivery: raw .js text, ASCII quotes only (Contract v1.1 §2.5).
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.engine) { console.error('[EF.enemies] engine.js must load before enemies.js'); return; }
  var bus = EF.engine.bus;

  function groundAt(x, z) {
    if (EF.world && typeof EF.world.terrainH === 'function') return EF.world.terrainH(x, z);
    if (EF.engine && typeof EF.engine.groundAt === 'function') return EF.engine.groundAt(x, z);
    return 0;
  }

  /* module-scope scratch — reused every frame, never reallocated */
  var _q = new THREE.Quaternion();
  var _camQ = new THREE.Quaternion();

  var pool = [];          // all enemy handles (fixed size, recycled)
  var idCounter = 0;

  /* [build-03 integrator patch, playtest bug #1] terrainH is ANALYTIC: it
   * returns heights for any (x,z), but the visual terrain mesh only spans
   * EF.worldData.terrain.size (±110). Spawn zones that poke past the mesh
   * edge put enemies on invisible ground — "floating, off-map". All spawn
   * candidates and per-frame AI movement are now clamped to the mesh. */
  var EDGE_MARGIN = 4;
  var HALF = 100; // refreshed from world data at boot; safe fallback
  function refreshWorldBounds() {
    var wd = EF.worldData;
    if (wd && wd.terrain && wd.terrain.size) HALF = wd.terrain.size * 0.5 - EDGE_MARGIN;
  }

  /* -------------------------------------------------- hp bar builder ---- */
  function makeHpBar(width) {
    var g = new THREE.Group();
    var bg = new THREE.Mesh(
      new THREE.PlaneGeometry(width, 0.14),
      new THREE.MeshBasicMaterial({ color: 0x1a0606, fog: false })
    );
    var fg = new THREE.Mesh(
      new THREE.PlaneGeometry(width, 0.14),
      new THREE.MeshBasicMaterial({ color: 0xdd3333, fog: false })
    );
    fg.position.z = 0.01;
    g.add(bg); g.add(fg);
    return { group: g, fg: fg, width: width };
  }

  /* ------------------------------------------------------ spawn pos ----- */
  function spawnInZone(zone, awayFromPlayer) {
    var p = EF.player && EF.player.position;
    var px = p ? p.x : 0, pz = p ? p.z : 0;
    for (var k = 0; k < 24; k++) {
      var ang = Math.random() * Math.PI * 2;
      var rad = Math.sqrt(Math.random()) * zone.r;
      var x = zone.cx + Math.cos(ang) * rad;
      var z = zone.cz + Math.sin(ang) * rad;
      /* [build-03] reject candidates off the terrain mesh */
      if (x < -HALF || x > HALF || z < -HALF || z > HALF) continue;
      var dpx = x - px, dpz = z - pz;
      if (!awayFromPlayer || (dpx * dpx + dpz * dpz) > 32 * 32) return { x: x, z: z };
    }
    /* [build-03] fallback: zone center clamped onto the mesh */
    return {
      x: Math.max(-HALF, Math.min(HALF, zone.cx)),
      z: Math.max(-HALF, Math.min(HALF, zone.cz))
    };
  }

  /* biome gate: if world exposes biomeAt, prefer a matching spot; else use the
   * static zone. Keeps spawn logic forward-compatible with world.js. */
  function pickSpawn(def, zone, biome, away) {
    if (EF.world && typeof EF.world.biomeAt === 'function') {
      for (var k = 0; k < 12; k++) {
        var s = spawnInZone(zone, away);
        if (EF.world.biomeAt(s.x, s.z) === biome) return s;
      }
    }
    return spawnInZone(zone, away);
  }

  /* ---------------------------------------------------- create pool ----- */
  function createEnemy(typeId, zone, biome) {
    var def = EF.data.enemyTypes.get(typeId);
    var built = def.build();
    var bar = makeHpBar(def.contactRadius * 2.4);
    bar.group.position.y = def.barY;
    built.group.add(bar.group);

    var e = {
      id: typeId + '-' + (++idCounter),
      typeId: typeId, def: def,
      root: built.group, parts: built.parts, bar: bar,
      x: 0, z: 0, yaw: 0,
      hp: def.maxhp, maxhp: def.maxhp,
      alive: true, state: 'idle',
      // timers / ai scratch (all mutated in place)
      wanderT: 0, tx: 0, tz: 0,
      atkPhase: 'none', atkT: 0, cooldownT: 0, struck: false,
      orbitSign: Math.random() < 0.5 ? 1 : -1,
      lungeT: 0, lungeVX: 0, lungeVZ: 0,
      deadT: 0, walkPhase: Math.random() * 6,
      zone: zone, biome: biome,
      _hitSwing: -1               // last combat swing id that hit this enemy
    };
    EF.engine.scene.add(e.root);
    return e;
  }

  function respawn(e, initial) {
    var s = pickSpawn(e.def, e.zone, e.biome, true);
    e.x = s.x; e.z = s.z;
    e.hp = e.maxhp; e.alive = true; e.state = 'wander';
    e.atkPhase = 'none'; e.atkT = 0; e.cooldownT = 0; e.struck = false;
    e.lungeT = 0; e.deadT = 0;
    e.root.rotation.set(0, 0, 0);
    e.root.visible = true;
    e.bar.group.visible = true;
    e.bar.fg.scale.x = 1; e.bar.fg.position.x = 0;
    resetPose(e);
    e.root.position.set(e.x, groundAt(e.x, e.z), e.z);
    bus.emit('enemy:spawned', { type: e.typeId, id: e.id, position: { x: e.x, y: groundAt(e.x, e.z), z: e.z } });
  }

  function resetPose(e) {
    var p = e.parts;
    if (p.telegraph) { p.telegraph.rotation.x = 0; }
    if (p.legL) p.legL.rotation.x = 0;
    if (p.legR) p.legR.rotation.x = 0;
    if (p.legs) for (var i = 0; i < p.legs.length; i++) p.legs[i].rotation.x = 0;
    if (p.armL) p.armL.rotation.x = 0;
  }

  /* ----------------------------------------------------- animation ------ */
  function animWalk(e, moveMag, dt) {
    var p = e.parts, def = e.def;
    e.walkPhase += dt * def.walkFreq * (0.4 + moveMag);
    var s = Math.sin(e.walkPhase) * 0.6 * (0.3 + moveMag);
    if (p.legs) {                       // quadruped: diagonal gait
      p.legs[0].rotation.x = s;  p.legs[3].rotation.x = s;
      p.legs[1].rotation.x = -s; p.legs[2].rotation.x = -s;
    } else if (p.legL) {                // biped
      p.legL.rotation.x = s; p.legR.rotation.x = -s;
      if (p.armL) p.armL.rotation.x = -s * 0.6;
    }
  }

  /* telegraph: rear the wind-up node back over the windup, snap through on the
   * strike, ease out on recover. t01 is 0..1 within the current sub-phase. */
  function animTelegraph(e) {
    var node = e.parts.telegraph;
    if (!node) return;
    if (e.atkPhase === 'windup') {
      node.rotation.x = -1.6 * e.atkT;             // rear back (up)
    } else if (e.atkPhase === 'strike') {
      node.rotation.x = -1.6 + 3.0 * e.atkT;       // chop down through
    } else if (e.atkPhase === 'recover') {
      node.rotation.x = 1.4 * (1 - e.atkT);        // settle
    } else {
      node.rotation.x *= 0.8;
    }
  }

  /* -------------------------------------------------- attack driver ----- */
  function startAttack(e) {
    e.state = 'attack';
    e.atkPhase = 'windup'; e.atkT = 0; e.struck = false;
  }

  function updateAttack(e, dt, dToPlayer) {
    var def = e.def;
    if (e.atkPhase === 'windup') {
      e.atkT += dt / def.windup;
      if (e.atkT >= 1) { e.atkPhase = 'strike'; e.atkT = 0; }
    } else if (e.atkPhase === 'strike') {
      e.atkT += dt / def.strike;
      if (!e.struck && e.atkT >= 0.4) {
        e.struck = true;
        // landing check: only connects if player is still in range
        if (dToPlayer <= def.attackRange + 0.4 && EF.combat && EF.combat.hurtPlayer) {
          EF.combat.hurtPlayer(def.damage, e.typeId);
        }
      }
      if (e.atkT >= 1) { e.atkPhase = 'recover'; e.atkT = 0; }
    } else if (e.atkPhase === 'recover') {
      e.atkT += dt / def.recover;
      if (e.atkT >= 1) {

      }

  }

  /* --------------------------------------------------- AI wrinkles ------ *
   * All wrinkles operate on numbers (e.x/e.z) — no vector allocation. Return
   * the intended move magnitude for the walk animation. */
  function aiChaseWolf(e, dt, px, pz, d) {
    var def = e.def;
    if (d <= def.lungeRange && e.cooldownT <= 0) { startAttack(e); return 0; }
    // orbit at radius, then close: blend a tangential component with radial
    var nx = (px - e.x) / (d || 1), nz = (pz - e.z) / (d || 1);
    var tx = -nz * e.orbitSign, tz = nx * e.orbitSign;         // tangent
    var pull = d > def.orbitRadius ? 1 : 0.15;                 // close in if far
    var mx = nx * pull + tx * (1 - pull) * 1.4;
    var mz = nz * pull + tz * (1 - pull) * 1.4;
    var mlen = Math.sqrt(mx * mx + mz * mz) || 1;
    e.x += (mx / mlen) * def.speed * dt;
    e.z += (mz / mlen) * def.speed * dt;
    e.yaw = Math.atan2(px - e.x, pz - e.z);
    return 1;
  }

  function aiChaseTank(e, dt, px, pz, d) {          // skeleton: plodding line
    var def = e.def;
    if (d <= def.attackRange && e.cooldownT <= 0) { startAttack(e); return 0; }
    var nx = (px - e.x) / (d || 1), nz = (pz - e.z) / (d || 1);
    e.x += nx * def.speed * dt;
    e.z += nz * def.speed * dt;
    e.yaw = Math.atan2(nx, nz);
    return 0.7;
  }

  function aiChaseKite(e, dt, px, pz, d) {           // bandit: keep distance, lunge
    var def = e.def;
    if (e.lungeT > 0) {                              // mid-lunge dash
      e.lungeT -= dt;
      e.x += e.lungeVX * dt; e.z += e.lungeVZ * dt;
      e.yaw = Math.atan2(px - e.x, pz - e.z);
      if (d <= def.attackRange && e.cooldownT <= 0) { e.lungeT = 0; startAttack(e); }
      return 1;
    }
    var nx = (px - e.x) / (d || 1), nz = (pz - e.z) / (d || 1);
    if (d < def.keepDistance - 0.5) {               // too close -> retreat
      e.x -= nx * def.retreatSpeed * dt;
      e.z -= nz * def.retreatSpeed * dt;
      e.yaw = Math.atan2(nx, nz);                    // still face player
      return 1;
    } else if (d > def.lungeRange) {                 // too far -> approach
      e.x += nx * def.speed * dt;
      e.z += nz * def.speed * dt;
      e.yaw = Math.atan2(nx, nz);
      return 0.8;
    } else if (e.cooldownT <= 0) {                   // in the pocket -> lunge
      e.lungeT = def.lungeTime;
      e.lungeVX = nx * def.lungeSpeed; e.lungeVZ = nz * def.lungeSpeed;
      return 1;
    }
    e.yaw = Math.atan2(nx, nz);
    return 0;
  }

  function aiChaseWander(e, dt, px, pz, d) {          // troll: heavy, slow close
    var def = e.def;
    if (d <= def.attackRange && e.cooldownT <= 0) { startAttack(e); return 0; }
    var nx = (px - e.x) / (d || 1), nz = (pz - e.z) / (d || 1);
    e.x += nx * def.speed * dt;
    e.z += nz * def.speed * dt;
    e.yaw = Math.atan2(nx, nz);
    return 0.6;
  }

  function doWander(e, dt) {
    var def = e.def;
    e.wanderT -= dt;
    if (e.wanderT <= 0) {
      e.wanderT = 2 + Math.random() * 4;
      e.tx = e.x + (Math.random() * 2 - 1) * 14;
      e.tz = e.z + (Math.random() * 2 - 1) * 14;
    }
    var wx = e.tx - e.x, wz = e.tz - e.z, wd = Math.sqrt(wx * wx + wz * wz);
    if (wd > 0.5) {
      var sp = def.speed * 0.4;
      e.x += (wx / wd) * sp * dt;
      e.z += (wz / wd) * sp * dt;
      e.yaw = Math.atan2(wx, wz);
      return 0.5;
    }
    return 0;
  }

  /* ------------------------------------------------------- per tick ----- */
  bus.on('game:tick', function (t) {
    if (t && t.__selfTest) return;
    if (pool.length === 0) return;
    var dt = t.dt;
    var p = EF.player && EF.player.position;
    var px = p ? p.x : 0, pz = p ? p.z : 0;
    _camQ.copy(EF.engine.camera.object.quaternion);
    var playerDead = EF.combat && EF.combat.isPlayerDead && EF.combat.isPlayerDead();

    for (var i = 0; i < pool.length; i++) {
      var e = pool[i];

      if (!e.alive) {                          // dead: topple, sink, respawn
        e.deadT += dt;
        e.bar.group.visible = false;
        e.root.rotation.z = Math.min(Math.PI / 2, e.deadT * 3.5);
        var sink = Math.min(1.2, Math.max(0, e.deadT - 1.6) * 0.7);
        e.root.position.y = groundAt(e.x, e.z) - sink;
        if (e.deadT > 7) { respawn(e, false); }
        continue;
      }

      if (e.cooldownT > 0) e.cooldownT -= dt;

      var dx = px - e.x, dz = pz - e.z, d = Math.sqrt(dx * dx + dz * dz);
      var moveMag = 0;

      if (e.state === 'attack') {
        updateAttack(e, dt, d);
        moveMag = 0;
      } else if (!playerDead && d < e.def.aggro) {
        e.state = 'chase';
        switch (e.def.wrinkle) {
          case 'circle': moveMag = aiChaseWolf(e, dt, px, pz, d); break;
          case 'tank':   moveMag = aiChaseTank(e, dt, px, pz, d); break;
          case 'kite':   moveMag = aiChaseKite(e, dt, px, pz, d); break;
          default:       moveMag = aiChaseWander(e, dt, px, pz, d); break;
        }
      } else {
        e.state = 'wander';
        moveMag = doWander(e, dt);
      }

      // [build-03] keep AI movement (chase/lunge/knockback/wander) on the mesh
      if (e.x < -HALF) e.x = -HALF; else if (e.x > HALF) e.x = HALF;
      if (e.z < -HALF) e.z = -HALF; else if (e.z > HALF) e.z = HALF;

      // commit transform
      e.root.position.set(e.x, groundAt(e.x, e.z), e.z);
      e.root.rotation.y = e.yaw;

      // leg/telegraph animation
      if (e.state !== 'attack') animWalk(e, moveMag, dt);

      // hp bar fill from current hp (combat is the writer; we only render)
      var r = e.maxhp > 0 ? Math.max(0, e.hp / e.maxhp) : 0;
      e.bar.fg.scale.x = Math.max(0.001, r);
      e.bar.fg.position.x = -(1 - r) * (e.bar.width * 0.5);
      // billboard: parent group is rotated, so undo it then face camera
      e.bar.group.quaternion.copy(e.root.quaternion).invert().multiply(_camQ);
    }
  });

  /* --------------------------------------------------- boot the pool ---- */
  bus.on('game:booted', function (bp) {
    if (bp && bp.__selfTest) return;
    refreshWorldBounds(); // [build-03] before any spawn math
    var roster = EF.data.enemyTypes.roster;
    for (var r = 0; r < roster.length; r++) {
      var entry = roster[r];
      for (var n = 0; n < entry.count; n++) {
        var e = createEnemy(entry.type, entry.zone, entry.biome);
        pool.push(e);
        respawn(e, true);
      }
    }
    console.log('[EF.enemies] pool ready: ' + pool.length + ' enemies across ' + roster.length + ' zones');
  });

  /* ----------------------------------------------------- public API ----- *
   * combat.js is the only writer of e.hp. It calls kill(e) when hp hits 0. */
  EF.enemies = {
    pool: pool,
    each: function (fn) { for (var i = 0; i < pool.length; i++) fn(pool[i], i); },
    applyKnockback: function (e, nx, nz, impulse) {
      // nx,nz should be a unit vector from player -> enemy
      e.x += nx * impulse * 0.18;
      e.z += nz * impulse * 0.18;
    },
    kill: function (e) {
      if (!e.alive) return;
      e.alive = false; e.state = 'dead'; e.deadT = 0;
      e.atkPhase = 'none';
      e.bar.group.visible = false;
      bus.emit('enemy:died', { type: e.typeId, id: e.id });
    }
  };
})();

<script>
/* ============================================================================
 * EMBERFELL — combat.js  (Combat dept, Cycle 2)
 * THE math authority (Contract v1.1 §5): ALL damage, xp, gold, and level math
 * live here, and combat.js is the ONLY writer of hp — both the player's and
 * every enemy's. Owns swing timing (wind-up / active hit window / recover),
 * arc test, knockback, level-scaled crit, player:levelup with stat growth, and
 * damage-number emission for UI popups.
 *
 * Reads swing input, player pose/weapon, and enemy pool; writes hp and stats;
 * tells enemies.js to kill(), tells player.js to respawnAt(). Emits:
 *   enemy:died (via enemies.kill), player:damaged, player:died, player:levelup,
 *   loot:collected, ui:toast, camera:shake, audio:play, and combat:damage
 *   (floating damage numbers — pre-approval pending; warns once until Engine
 *   Core adds it to CANONICAL_EVENTS).
 *
 * Load order: LAST (after player.js and enemies.js). Depends on THREE (r128),
 * EF.engine (bus/input/audio/time/camera), EF.player, EF.enemies,
 * EF.data.weapons.
 * A-1 note: attack is tap-triggered via wasPressed('attack'); no hold/charge.
 * Delivery: raw .js text, ASCII quotes only (Contract v1.1 §2.5).
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.engine) { console.error('[EF.combat] engine.js must load before combat.js'); return; }
  var bus = EF.engine.bus, input = EF.engine.input;

  /* register combat sfx (engine ships jump/hit/hurt/pickup/ui.click already) */
  (function registerSfx() {
    var A = EF.engine.audio;
    A.register('swing.light', { type: 'sawtooth', freq: 520, freqEnd: 300, duration: 0.10, gain: 0.10 });
    A.register('swing.mid',   { type: 'sawtooth', freq: 300, freqEnd: 150, duration: 0.14, gain: 0.14 });
    A.register('swing.heavy', { type: 'sawtooth', freq: 180, freqEnd: 80,  duration: 0.22, gain: 0.18 });
    A.register('enemy.hit',   { type: 'square',   freq: 160, freqEnd: 70,  duration: 0.12, gain: 0.16 });
    A.register('crit',        { type: 'square',   freq: 900, freqEnd: 300, duration: 0.16, gain: 0.20 });
    A.register('levelup',     { type: 'triangle', freq: 440, freqEnd: 880, duration: 0.30, gain: 0.20 });
    A.register('loot.gold',   { type: 'square',   freq: 880, freqEnd: 1320,duration: 0.10, gain: 0.14 });
  })();

  function sfx(name) { bus.emit('audio:play', { sfx: name }); }

  /* ==================== LEVEL / STAT MATH ==================== */
  var CRIT_PER_LEVEL = 0.02, CRIT_CAP = 0.5, CRIT_MULT = 2.0;

  function critChance(weaponDef) {
    var s = EF.player.stats;
    var base = CRIT_PER_LEVEL * (s.lvl - 1) + (weaponDef ? weaponDef.critBonus : 0);
    return Math.max(0, Math.min(CRIT_CAP, base));
  }

  function rollDamage(weaponDef, crit) {
    var s = EF.player.stats;
    var lo = weaponDef.damage[0], hi = weaponDef.damage[1];
    var base = lo + Math.random() * (hi - lo);
    // player attack power (s.dmg) scales the weapon's base band
    var scaled = base * (s.dmg / 20);
    if (crit) scaled *= CRIT_MULT;
    return Math.round(scaled);
  }

  function gainXp(n) {
    var s = EF.player.stats;
    s.xp += n;
    while (s.xp >= s.xpNext) {
      s.xp -= s.xpNext;
      s.lvl++;
      s.xpNext = Math.floor(s.xpNext * 1.5);
      // stat growth
      s.maxhp += 20; s.hp = s.maxhp;          // heal to full on level
      s.maxst += 5;  s.st = s.maxst;
      s.dmg += 6;
      sfx('levelup');
      bus.emit('player:levelup', { level: s.lvl });
      bus.emit('ui:toast', { text: 'Level ' + s.lvl + '!' });
    }
  }

  function awardGold(min, max) {
    var s = EF.player.stats;
    var g = Math.floor(min + Math.random() * (max - min + 1));
    s.gold += g;
    sfx('loot.gold');
    bus.emit('loot:collected', { item: 'gold', count: g });
    return g;
  }

  /* ==================== ENEMY HP (combat is sole writer) ==================== */
  function damageEnemy(e, amount, crit, nx, nz, weaponDef) {
    e.hp -= amount;                             // <-- the ONLY enemy hp write
    bus.emit('combat:damage', {
      amount: amount, crit: !!crit, target: 'enemy',
      position: { x: e.x, y: groundAt(e.x, e.z) + (e.def.barY + 0.3), z: e.z }
    });
    EF.enemies.applyKnockback(e, nx, nz, weaponDef.knockback * (crit ? 1.5 : 1));
    if (e.hp <= 0 && e.alive) {
      EF.enemies.kill(e);                       // enemies.kill emits enemy:died
      gainXp(e.def.xp);
      awardGold(e.def.gold[0], e.def.gold[1]);
      if (Math.random() < e.def.potionChance) {
        bus.emit('loot:collected', { item: 'potion', count: 1 });
        bus.emit('ui:toast', { text: '+1 Potion' });
      }
    }
  }

  function groundAt(x, z) {
    if (EF.world && typeof EF.world.terrainH === 'function') return EF.world.terrainH(x, z);
    if (EF.engine && typeof EF.engine.groundAt === 'function') return EF.engine.groundAt(x, z);
    return 0;
  }

  /* ==================== SWING STATE MACHINE ==================== */
  var swing = { active: false, phase: 'idle', t: 0, t01: 0, weapon: null, id: 0, hitDone: false };

  function tryStartSwing() {
    if (swing.active || isPlayerDead) return;
    var w = EF.player.getWeapon();
    if (!w) return;
    if (!EF.player.trySpendStamina(w.stamina)) return;   // player owns stamina
    swing.active = true;
    swing.phase = 'windup';
    swing.t = 0; swing.t01 = 0;
    swing.weapon = w;
    swing.id++;
    swing.hitDone = false;
    sfx(w.sfx);
  }

  function updateSwing(dt) {
    if (!swing.active) return;
    var w = swing.weapon;
    var total = w.windup + w.active + w.recover;
    swing.t += dt;
    swing.t01 = Math.min(1, swing.t / total);

    if (swing.t < w.windup) {
      swing.phase = 'windup';
    } else if (swing.t < w.windup + w.active) {
      swing.phase = 'active';
      if (!swing.hitDone) { swing.hitDone = true; resolveHit(w); }  // hit window
    } else if (swing.t < total) {
      swing.phase = 'recover';
    } else {
      swing.active = false; swing.phase = 'idle'; swing.weapon = null;
    }
  }

  /* arc + reach test against the enemy pool. No allocation. */
  function resolveHit(w) {
    var pp = EF.player.position;
    var px = pp.x, pz = pp.z, yaw = pp.yaw;
    var fx = Math.sin(yaw), fz = Math.cos(yaw);       // player forward
    var cosHalf = Math.cos(w.arc * 0.5);
    var crit = Math.random() < critChance(w);
    var hitAny = false;
    var pool = EF.enemies.pool;

    for (var i = 0; i < pool.length; i++) {
      var e = pool[i];
      if (!e.alive || e._hitSwing === swing.id) continue;
      var dx = e.x - px, dz = e.z - pz;
      var d = Math.sqrt(dx * dx + dz * dz);
      if (d > w.reach + e.def.contactRadius) continue;
      var nx = dx / (d || 1), nz = dz / (d || 1);
      var dot = nx * fx + nz * fz;
      if (dot < cosHalf) continue;                    // outside the arc
      e._hitSwing = swing.id;
      var dmg = rollDamage(w, crit);
      damageEnemy(e, dmg, crit, nx, nz, w);
      hitAny = true;
    }

    if (hitAny) {
      sfx(crit ? 'crit' : 'enemy.hit');
      // heavier weapons and crits sell weight with a small camera shake
      var shake = (crit ? 0.28 : 0.12) + w.knockback * 0.02;
      bus.emit('camera:shake', { intensity: Math.min(0.5, shake), duration: 0.18 });
    }
  }

  /* ==================== PLAYER HP (combat is sole writer) ==================== */
  var isPlayerDead = false;
  var hurtCd = 0;
  var IFRAMES = 0.6;

  function hurtPlayer(amount, sourceType) {
    if (isPlayerDead || hurtCd > 0) return;
    var s = EF.player.stats;
    hurtCd = IFRAMES;
    s.hp -= amount;                              // <-- the ONLY player hp write
    bus.emit('player:damaged', { amount: amount, source: sourceType || 'unknown' });
    bus.emit('combat:damage', {
      amount: amount, crit: false, target: 'player',
      position: { x: EF.player.position.x, y: EF.player.position.y + 2.2, z: EF.player.position.z }
    });
    sfx('hurt');
    if (s.hp <= 0) {
      s.hp = 0;
      isPlayerDead = true;
      bus.emit('player:died', { cause: sourceType || 'unknown' });
      bus.emit('ui:toast', { text: 'You died' });
    }
  }

  function respawn(x, z) {
    var s = EF.player.stats;
    isPlayerDead = false; hurtCd = IFRAMES + 0.6;
    s.hp = s.maxhp; s.st = s.maxst;
    EF.player.respawnAt(x != null ? x : 0, z != null ? z : 8);
  }

  function heal(amount) {
    if (isPlayerDead) return;
    var s = EF.player.stats;
    s.hp = Math.min(s.maxhp, s.hp + amount);
    bus.emit('combat:damage', {
      amount: amount, crit: false, target: 'heal',
      position: { x: EF.player.position.x, y: EF.player.position.y + 2.2, z: EF.player.position.z }
    });
  }

  /* ==================== TICK ==================== */
  bus.on('game:tick', function (t) {
    if (t && t.__selfTest) return;
    var dt = t.dt;
    if (hurtCd > 0) hurtCd -= dt;
    if (input.buttons.wasPressed('attack')) tryStartSwing();
    updateSwing(dt);
  });

  /* ==================== PUBLIC API ==================== */
  EF.combat = {
    // read model for player.js arm animation (returns stable object, no alloc)
    getSwing: function () { return swing; },
    isPlayerDead: function () { return isPlayerDead; },
    // enemies.js calls this on a landed strike instead of touching player hp
    hurtPlayer: hurtPlayer,
    heal: heal,
    respawn: respawn,
    // exposed for UI/inventory hooks
    gainXp: gainXp,
    critChance: critChance
  };
})();
</script>

<script>
/* ============================================================================
 * EMBERFELL -- diag-controls.js  (TEMPORARY, Integrator, build-03)
 * Playtest gap #3: UI dept has not delivered, so combat/death/respawn could
 * not be tested on the phone. Three touch buttons wired through the REAL
 * input path -- EF.engine.input.bindButton -- so Attack and Jump go through
 * the same wasPressed() edges combat.js and player.js already poll, and
 * emit canonical input:button events. Respawn polls its own button edge on
 * game:tick and calls EF.combat.respawn() (which drives player.respawnAt ->
 * player:spawned). DELETE THIS MODULE when UI delivers in Cycle 3.
 * s2.2: no <style> tags -- cssText only. No private rAF. No per-frame alloc
 * (tick handler only reads button edges).
 * A-1 note: pointerleave releases the button -- fine, these are tap actions.
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  if (!EF.engine) { console.error('[EF.diagControls] engine.js must load first'); return; }
  var input = EF.engine.input, bus = EF.bus;

  function circleBtn(label, bottom, size) {
    var el = document.createElement('div');
    el.style.cssText =
      'position:fixed;right:18px;bottom:' + bottom + 'px;width:' + size + 'px;height:' + size + 'px;' +
      'border-radius:50%;background:rgba(20,30,26,0.55);border:2px solid rgba(216,240,216,0.5);' +
      'color:#d8f0d8;font:bold 12px/' + size + 'px monospace;text-align:center;' +
      'z-index:8;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;';
    el.textContent = label;
    document.body.appendChild(el);
    return el;
  }

  bus.on('game:booted', function (p) {
    if (p && p.__selfTest) return;

    var atkEl = circleBtn('ATK', 26, 78);
    var jmpEl = circleBtn('JMP', 122, 64);
    var rspEl = document.createElement('div');
    rspEl.style.cssText =
      'position:fixed;left:50%;bottom:16px;width:96px;margin-left:-48px;padding:8px 0;' +
      'border-radius:16px;background:rgba(40,14,12,0.6);border:2px solid rgba(255,160,140,0.5);' +
      'color:#ffd7d0;font:bold 11px monospace;text-align:center;' +
      'z-index:8;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;';
    rspEl.textContent = 'RESPAWN';
    document.body.appendChild(rspEl);

    /* the real input path: same names combat.js / player.js already poll */
    input.bindButton('attack', atkEl);
    input.bindButton('jump', jmpEl);
    input.bindButton('respawn', rspEl);

    /* pressed-state feedback off the canonical input:button edge events */
    var els = { attack: atkEl, jump: jmpEl, respawn: rspEl };
    bus.on('input:button', function (b) {
      if (!b || b.__selfTest) return;
      var el = els[b.name];
      if (el) el.style.background = b.pressed ? 'rgba(120,200,140,0.45)'
                                              : (b.name === 'respawn' ? 'rgba(40,14,12,0.6)' : 'rgba(20,30,26,0.55)');
    });

    bus.on('game:tick', function (t) {
      if (t && t.__selfTest) return;
      if (input.buttons.wasPressed('respawn') && EF.combat) EF.combat.respawn();
    });

    console.log('[EF.diagControls] temporary controls bound: attack / jump / respawn');
  });
})();
</script>
<!-- ================= diag.js             QA OVERLAY (diag build only) ================= -->
<script>
/* ============================================================================
 * EMBERFELL -- diag.js  (Integrator/QA overlay, build-03-diag ONLY)
 * Contract v1.1 "Build discipline": error overlay + probes + FPS badge.
 * The phone is the QA rig and cannot otherwise report errors.
 *
 * - No <style> tags (s2.2): every style is el.style.cssText.
 * - No private rAF loop (s5): rides game:tick, throttled to 4 Hz.
 * - Draw calls are read from renderer.info.render.calls (previous frame's
 *   count, since render happens after the tick emit). Budget: <= 60.
 * - Auto-runs EF.engine.selfTest() 2 s after boot; result shown in badge.
 * - NOTE: the overlay allocates strings at 4 Hz while updating its DOM text.
 *   That is a diag-build-only cost and is why this file never ships in the
 *   clean build (CR-2 applies to shipping modules, not the QA rig).
 * ========================================================================= */
(function () {
  'use strict';
  var EF = (window.EF = window.EF || {});
  var DRAW_BUDGET = 60;
  var counts = { error: 0, warn: 0 };
  var maxCalls = 0, selfTestResult = '--';

  var badge = null, probeLine = null, logPanel = null;

  function makeDom() {
    badge = document.createElement('div');
    badge.style.cssText =
      'position:fixed;top:6px;left:6px;z-index:9999;pointer-events:none;' +
      'font:11px/1.45 monospace;color:#d8f0d8;background:rgba(10,18,14,0.72);' +
      'padding:5px 8px;border-radius:6px;border:1px solid rgba(120,200,140,0.35);' +
      'white-space:pre;max-width:70vw;';
    badge.textContent = '[EF diag] waiting for boot...';
    probeLine = document.createElement('div');
    probeLine.style.cssText =
      'position:fixed;top:6px;right:6px;z-index:9999;pointer-events:none;' +
      'font:10px/1.4 monospace;color:#cfd8e6;background:rgba(10,14,20,0.72);' +
      'padding:4px 7px;border-radius:6px;border:1px solid rgba(130,160,220,0.3);' +
      'white-space:pre;text-align:right;';
    logPanel = document.createElement('div');
    logPanel.style.cssText =
      'position:fixed;left:6px;right:6px;bottom:6px;z-index:9999;display:none;' +
      'pointer-events:none;font:10px/1.4 monospace;color:#ffd7d0;' +
      'background:rgba(30,8,6,0.82);padding:5px 8px;border-radius:6px;' +
      'border:1px solid rgba(255,110,90,0.5);max-height:34vh;overflow:hidden;' +
      'white-space:pre-wrap;word-break:break-all;';
    document.body.appendChild(badge);
    document.body.appendChild(probeLine);
    document.body.appendChild(logPanel);
  }

  var lines = [];
  function pushLog(kind, msg) {
    counts[kind]++;
    if (!logPanel) return;
    lines.push('[' + kind + '] ' + msg);
    if (lines.length > 10) lines.shift();
    logPanel.textContent = lines.join('\n');
    logPanel.style.display = 'block';
  }

  function fmtArgs(args) {
    var out = [];
    for (var i = 0; i < args.length; i++) {
      var a = args[i];
      if (a && a.stack) out.push(String(a.message || a));
      else { try { out.push(typeof a === 'string' ? a : JSON.stringify(a)); }
             catch (e) { out.push(String(a)); } }
    }
    return out.join(' ');
  }

  /* mirror console.error / console.warn into the overlay */
  var origErr = console.error, origWarn = console.warn;
  console.error = function () { pushLog('error', fmtArgs(arguments)); origErr.apply(console, arguments); };
  console.warn = function () { pushLog('warn', fmtArgs(arguments)); origWarn.apply(console, arguments); };
  window.addEventListener('error', function (e) {
    pushLog('error', (e.message || 'script error') + ' @' + (e.filename || '?') + ':' + (e.lineno || '?'));
  });
  window.addEventListener('unhandledrejection', function (e) {
    pushLog('error', 'unhandled rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  function probeText() {
    var ok = function (b) { return b ? 'OK' : 'MISSING'; };
    return 'EF.engine ' + ok(!!EF.engine) +
      ' | EF.world ' + ok(!!EF.world && EF.world.ready) +
      ' | EF.player ' + ok(!!EF.player) +
      '\nEF.combat ' + ok(!!EF.combat) +
      ' | EF.enemies ' + ok(!!EF.enemies) + (EF.enemies ? ' (' + EF.enemies.pool.length + ')' : '') +
      '\nEF.npcs ' + ok(!!EF.npcs) + ' | EF.quests ' + ok(!!EF.quests) + ' | EF.ui ' + ok(!!EF.ui) +
      '\nselfTest: ' + selfTestResult;
  }

  var acc = 0;
  function onTick(t) {
    if (t && t.__selfTest) return;
    acc += t.dt;
    if (acc < 0.25) return;
    acc = 0;
    var time = EF.engine.time;
    var info = EF.engine.renderer ? EF.engine.renderer.info.render : null;
    var calls = info ? info.calls : 0;
    if (calls > maxCalls) maxCalls = calls;
    var budget = maxCalls <= DRAW_BUDGET ? 'PASS' : 'OVER BUDGET';
    badge.textContent =
      'EMBERFELL build-03-diag\n' +
      'fps ' + time.fps + '  frame ' + time.frame + '\n' +
      'draw calls ' + calls + '  max ' + maxCalls + '/' + DRAW_BUDGET + ' ' + budget + '\n' +
      (info ? 'tris ' + info.triangles + '\n' : '') +
      (EF.player ? 'hp ' + Math.round(EF.player.stats.hp) + '/' + EF.player.stats.maxhp +
        '  st ' + Math.round(EF.player.stats.st) + '  lvl ' + EF.player.stats.lvl + '\n' : '') +
      'phase ' + (EF.world && EF.world.getTimePhase ? EF.world.getTimePhase() : '--') +
      '  err ' + counts.error + '  warn ' + counts.warn;
    probeLine.textContent = probeText();
  }

  EF.bus.on('game:booted', function (p) {
    if (p && p.__selfTest) return;
    if (!badge) makeDom();
    EF.bus.on('game:tick', onTick);
    setTimeout(function () {
      try {
        var r = EF.engine.selfTest();
        selfTestResult = (r.pass ? 'PASS' : 'FAIL') + ' (' + r.results.length + ' events)';
      } catch (e) { selfTestResult = 'THREW: ' + e.message; }
    }, 2000);
  });

  /* if boot already happened (script order safety) */
  if (EF.engine && EF.engine.booted) {
    makeDom();
    EF.bus.on('game:tick', onTick);
  }
})();
</script>
